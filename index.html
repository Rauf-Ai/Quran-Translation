<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quran Live</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0d0d0d;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;}

.app{display:grid;grid-template-columns:1fr 76px;height:100%;}
@media(orientation:portrait){
.app{grid-template-columns:1fr;grid-template-rows:1fr 72px;}
.sidebar{flex-direction:row;justify-content:center;border-left:none;border-top:1px solid #161616;padding:0 0 6px;}
.content{padding:0 22px;}
.settings-panel{right:14px!important;top:48px!important;}
}

.content{padding:0 28px;display:flex;flex-direction:column;overflow:hidden;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;flex-shrink:0;position:relative;z-index:10;}
.app-title{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:#2a2a2a;font-weight:300;}

.gear-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2a2a2a;transition:color .2s;border-radius:50%;}
.gear-btn:hover,.gear-btn.open{color:#888;}
.gear-btn svg{width:14px;height:14px;}

.settings-panel{position:fixed;top:46px;right:84px;width:255px;background:#131313;border:1px solid #1f1f1f;border-radius:13px;padding:15px;z-index:500;display:none;box-shadow:0 24px 64px rgba(0,0,0,.99);}
.settings-panel.open{display:block;}
.s-label{display:block;font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:#3a3a3a;margin-bottom:6px;margin-top:13px;}
.s-label:first-child{margin-top:0;}
.settings-panel input,.settings-panel select{width:100%;background:#0d0d0d;border:1px solid #1f1f1f;border-radius:7px;padding:8px 10px;color:#bbb;font-family:‘Inter’,sans-serif;font-size:.82rem;outline:none;}
.settings-panel input:focus,.settings-panel select:focus{border-color:#2e2e2e;}
.settings-panel select option{background:#131313;}
.mode-toggle{display:flex;background:#0d0d0d;border:1px solid #1f1f1f;border-radius:7px;overflow:hidden;}
.mode-btn{flex:1;padding:8px 0;border:none;background:transparent;color:#3a3a3a;font-family:‘Inter’,sans-serif;font-size:.74rem;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:#1a1a1a;color:#bbb;}
.btn-save{width:100%;margin-top:12px;padding:8px;background:#fff;color:#000;border:none;border-radius:7px;font-family:‘Inter’,sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}

/* pace */
.pace-bar{display:none;align-items:center;gap:7px;padding:4px 0 8px;flex-shrink:0;}
.pace-bar.on{display:flex;}
.pace-dot{width:4px;height:4px;border-radius:50%;background:#1e1e1e;transition:background .3s;}
.pace-dot.on{background:#555;}
.pace-lbl{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#2a2a2a;}
.pace-lbl.ok{color:#444;}

/* 3-slot stage */
.stage{flex:1;display:none;flex-direction:column;overflow:hidden;}
.stage.on{display:flex;}

.slot{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0;transition:opacity .45s ease;}
.slot.prev{opacity:.18;}
.slot.cur{opacity:1;border-top:1px solid #181818;border-bottom:1px solid #181818;}
.slot.nxt{opacity:.18;}

.ar{font-family:‘Amiri’,serif;font-size:clamp(1rem,3.6vw,1.85rem);line-height:1.95;direction:rtl;text-align:right;color:#f0f0f0;}
.tr{margin-top:5px;font-size:clamp(.76rem,1.7vw,.92rem);line-height:1.6;color:#999;font-weight:300;}
.rf{margin-top:5px;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:#242424;}

/* ruku badge */
.ruku-badge{display:none;align-items:center;gap:8px;padding:5px 0 8px;flex-shrink:0;}
.ruku-badge.on{display:flex;}
.ruku-dot{width:6px;height:6px;border-radius:50%;background:#333;animation:dp 1.4s ease-in-out infinite;}
.ruku-txt{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:#333;}

/* idle */
.idle{flex:1;display:flex;flex-direction:column;justify-content:center;gap:9px;}
.dots{display:flex;gap:5px;}
.dots span{width:3px;height:3px;border-radius:50%;background:#1e1e1e;animation:dp 1.4s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.dots.on span{background:#777;}
.idle-lbl{font-size:.62rem;letter-spacing:.17em;text-transform:uppercase;color:#222;}

/* sidebar */
.sidebar{border-left:1px solid #131313;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:14px 0;flex-shrink:0;}
.mic{width:52px;height:52px;border-radius:50%;border:1.5px solid #1a1a1a;background:#0f0f0f;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;position:relative;}
.mic svg{width:19px;height:19px;fill:#888;transition:fill .2s;}
.mic:hover{border-color:#333;}
.mic.on{background:#eee;border-color:#eee;}
.mic.on svg{fill:#000;}
.mic.on::after{content:’’;position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(255,255,255,.07);animation:ring 2s ease-out infinite;}
@keyframes ring{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.6);opacity:0;}}
.mic.busy svg{fill:#222;}
.tmr{font-size:.58rem;color:#222;letter-spacing:.07em;font-variant-numeric:tabular-nums;}
</style>

</head>

<script>
const QB=[
[1,1,"Al-Fatiha","بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ","Во имя Аллаха, Милостивого, Милосердного","In the name of Allah, the Entirely Merciful, the Especially Merciful"],
[1,2,"Al-Fatiha","الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ","Хвала Аллаху, Господу миров","All praise is due to Allah, Lord of the worlds"],
[1,3,"Al-Fatiha","الرَّحْمَٰنِ الرَّحِيمِ","Милостивому, Милосердному","The Entirely Merciful, the Especially Merciful"],
[1,4,"Al-Fatiha","مَالِكِ يَوْمِ الدِّينِ","Владыке Дня воздаяния","Sovereign of the Day of Recompense"],
[1,5,"Al-Fatiha","إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ","Тебе одному мы поклоняемся и Тебя одного молим о помощи","It is You we worship and You we ask for help"],
[1,6,"Al-Fatiha","اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ","Веди нас прямым путём","Guide us to the straight path"],
[1,7,"Al-Fatiha","صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ","Путём тех, кого Ты облагодетельствовал, не тех, на кого пал гнев, и не заблудших","The path of those upon whom You have bestowed favor, not of those who have earned Your anger or of those who are astray"],
[67,1,"Al-Mulk","تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ","Благословен Тот, в Чьей Руке власть, и Кто способен на всякую вещь!","Blessed is He in whose hand is dominion, and He is over all things competent"],
[67,2,"Al-Mulk","الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا وَهُوَ الْعَزِيزُ الْغَفُورُ","Тот, Кто создал смерть и жизнь, чтобы испытать вас, кто из вас лучше по делам. Он — Могущественный, Прощающий.","He who created death and life to test you as to which of you is best in deed - and He is the Exalted in Might, the Forgiving"],
[67,3,"Al-Mulk","الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا مَّا تَرَىٰ فِي خَلْقِ الرَّحْمَٰنِ مِن تَفَاوُتٍ فَارْجِعِ الْبَصَرَ هَلْ تَرَىٰ مِن فُطُورٍ","Тот, Кто создал семь небес одно над другим. Ты не увидишь в творении Милостивого никакого несоответствия. Обрати свой взор: видишь ли ты какие-нибудь трещины?","He who created seven heavens in layers. You do not see in the creation of the Most Merciful any inconsistency. So return your vision. Do you see any breaks?"],
[67,4,"Al-Mulk","ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ يَنقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ","Потом посмотри ещё раз и ещё раз. Твой взор вернётся к тебе унижённым и утомлённым.","Then return your vision twice again. Your vision will return to you humbled while it is fatigued"],
[67,5,"Al-Mulk","وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِّلشَّيَاطِينِ وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ","Мы украсили ближайшее небо светильниками и сделали их камнями против шайтанов. Мы уготовили для них мучение в Пламени.","And We have certainly beautified the nearest heaven with stars and have made from them what is thrown at the devils and have prepared for them the punishment of the Blaze"],
[67,6,"Al-Mulk","وَلِلَّذِينَ كَفَرُوا بِرَبِّهِمْ عَذَابُ جَهَنَّمَ وَبِئْسَ الْمَصِيرُ","А для тех, кто не уверовал в своего Господа, уготованы мучения Геенны. Как же скверно это возвращение!","And for those who disbelieved in their Lord is the punishment of Hell, and wretched is the destination"],
[67,7,"Al-Mulk","إِذَا أُلْقُوا فِيهَا سَمِعُوا لَهَا شَهِيقًا وَهِيَ تَفُورُ","Когда их бросят туда, они услышат её вой, и она будет клокотать","When they are thrown into it, they hear from it a dreadful inhaling while it boils up"],
[67,8,"Al-Mulk","تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ كُلَّمَا أُلْقِيَ فِيهَا فَوْجٌ سَأَلَهُمْ خَزَنَتُهَا أَلَمْ يَأْتِكُمْ نَذِيرٌ","она готова лопнуть от злобы. Всякий раз, когда в неё бросают очередную толпу, её стражи спрашивают: «Разве к вам не приходил предостерегающий?»","It almost bursts with rage. Every time a company is thrown into it, its keepers ask them, Did there not come to you a warner?"],
[67,9,"Al-Mulk","قَالُوا بَلَىٰ قَدْ جَاءَنَا نَذِيرٌ فَكَذَّبْنَا وَقُلْنَا مَا نَزَّلَ اللَّهُ مِن شَيْءٍ إِنْ أَنتُمْ إِلَّا فِي ضَلَالٍ كَبِيرٍ","Они отвечают: «Да, к нам приходил предостерегающий, но мы сочли его лжецом и сказали: Аллах ничего не ниспосылал. Вы пребываете в великом заблуждении».","They will say, Yes, a warner had come to us, but we denied and said, Allah has not sent down anything. You are not but in great error"],
[67,10,"Al-Mulk","وَقَالُوا لَوْ كُنَّا نَسْمَعُ أَوْ نَعْقِلُ مَا كُنَّا فِي أَصْحَابِ السَّعِيرِ","Они скажут: «Если бы мы прислушивались или размышляли, то не оказались бы среди обитателей Пламени»","And they will say, If only we had been listening or reasoning, we would not be among the companions of the Blaze"],
[67,11,"Al-Mulk","فَاعْتَرَفُوا بِذَنبِهِمْ فَسُحْقًا لِّأَصْحَابِ السَّعِيرِ","И они признают свои грехи. Да будут прокляты обитатели Пламени!","And they will admit their sin, so may it be far from mercy for the companions of the Blaze"],
[67,12,"Al-Mulk","إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُم بِالْغَيْبِ لَهُم مَّغْفِرَةٌ وَأَجْرٌ كَبِيرٌ","Воистину, тем, кто боится своего Господа втайне, уготованы прощение и великая награда","Indeed, those who fear their Lord unseen will have forgiveness and great reward"],
[67,13,"Al-Mulk","وَأَسِرُّوا قَوْلَكُمْ أَوِ اجْهَرُوا بِهِ إِنَّهُ عَلِيمٌ بِذَاتِ الصُّدُورِ","Говорите ли вы тайно или открыто — Он ведает о том, что в груди","And conceal your speech or publicize it; indeed, He is Knowing of that within the breasts"],
[67,14,"Al-Mulk","أَلَا يَعْلَمُ مَنْ خَلَقَ وَهُوَ اللَّطِيفُ الْخَبِيرُ","Разве Тот, Кто сотворил, не знает? Он — Проницательный, Ведающий.","Does He who created not know, while He is the Subtle, the Aware?"],
[67,15,"Al-Mulk","هُوَ الَّذِي جَعَلَ لَكُمُ الْأَرْضَ ذَلُولًا فَامْشُوا فِي مَنَاكِبِهَا وَكُلُوا مِن رِّزْقِهِ وَإِلَيْهِ النُّشُورُ","Он — Тот, Кто сделал для вас землю покорной. Ступайте же по её просторам и питайтесь из Его удела. К Нему состоится воскрешение.","It is He who made the earth tame for you - so walk among its slopes and eat of His provision - and to Him is the resurrection"],
[67,16,"Al-Mulk","أَأَمِنتُم مَّن فِي السَّمَاءِ أَن يَخْسِفَ بِكُمُ الْأَرْضَ فَإِذَا هِيَ تَمُورُ","Неужели вы чувствуете себя в безопасности от Того, Кто на небе, если Он велит земле поглотить вас, и она заколышется?","Do you feel secure that He who is above the heaven would not cause the earth to swallow you and suddenly it would sway?"],
[67,17,"Al-Mulk","أَمْ أَمِنتُم مَّن فِي السَّمَاءِ أَن يُرْسِلَ عَلَيْكُمْ حَاصِبًا فَسَتَعْلَمُونَ كَيْفَ نَذِيرِ","Или же вы чувствуете себя в безопасности от Того, Кто на небе, если Он пошлёт на вас ураган с камнями? Вы узнаете, каким было Моё предостережение!","Or do you feel secure that He who is above the heaven would not send against you a storm of stones? Then you would know how My warning is"],
[67,18,"Al-Mulk","وَلَقَدْ كَذَّبَ الَّذِينَ مِن قَبْلِهِمْ فَكَيْفَ كَانَ نَكِيرِ","Те, кто жил до них, тоже считали посланников лжецами. Каким же было Моё порицание?","And already had those before them denied, and how terrible was My reproach"],
[67,19,"Al-Mulk","أَوَلَمْ يَرَوْا إِلَى الطَّيْرِ فَوْقَهُمْ صَافَّاتٍ وَيَقْبِضْنَ مَا يُمْسِكُهُنَّ إِلَّا الرَّحْمَٰنُ إِنَّهُ بِكُلِّ شَيْءٍ بَصِيرٌ","Неужели они не смотрят на птиц над ними, которые то расправляют крылья, то складывают их? Никто, кроме Милостивого, не удерживает их. Воистину, Он видит всякую вещь.","Do they not see the birds above them with wings outspread and sometimes folded in? None holds them aloft except the Most Merciful. Indeed He is, of all things, Seeing"],
[67,20,"Al-Mulk","أَمَّنْ هَٰذَا الَّذِي هُوَ جُندٌ لَّكُمْ يَنصُرُكُم مِّن دُونِ الرَّحْمَٰنِ إِنِ الْكَافِرُونَ إِلَّا فِي غُرُورٍ","Кто может стать для вас войском и оказать вам помощь вместо Милостивого? Неверующие пребывают лишь в заблуждении.","Or who is it that could be an army for you to aid you other than the Most Merciful? The disbelievers are not but in delusion"],
[67,21,"Al-Mulk","أَمَّنْ هَٰذَا الَّذِي يَرْزُقُكُمْ إِنْ أَمْسَكَ رِزْقَهُ بَل لَّجُّوا فِي عُتُوٍّ وَنُفُورٍ","Кто может пропитать вас, если Он задержит Своё пропитание? Но нет — они погрязли в высокомерии и бегстве от истины.","Or who is it that could provide for you if He withheld His provision? But they have persisted in insolence and aversion"],
[67,22,"Al-Mulk","أَفَمَن يَمْشِي مُكِبًّا عَلَىٰ وَجْهِهِ أَهْدَىٰ أَمَّن يَمْشِي سَوِيًّا عَلَىٰ صِرَاطٍ مُّسْتَقِيمٍ","Кто следует вернее — тот, кто падает ниц на своё лицо, или тот, кто ступает прямо по прямому пути?","Then is one who walks fallen on his face better guided or one who walks erect on a straight path?"],
[67,23,"Al-Mulk","قُلْ هُوَ الَّذِي أَنشَأَكُمْ وَجَعَلَ لَكُمُ السَّمْعَ وَالْأَبْصَارَ وَالْأَفْئِدَةَ قَلِيلًا مَّا تَشْكُرُونَ","Скажи: «Он — Тот, Кто создал вас и наделил вас слухом, зрением и сердцами. Как мало вы благодарите!»","Say, It is He who has produced you and made for you hearing and vision and hearts; little are you grateful"],
[67,24,"Al-Mulk","قُلْ هُوَ الَّذِي ذَرَأَكُمْ فِي الْأَرْضِ وَإِلَيْهِ تُحْشَرُونَ","Скажи: «Он — Тот, Кто расселил вас по земле, и к Нему вы будете собраны».","Say, It is He who has multiplied you throughout the earth, and to Him you will be gathered"],
[67,25,"Al-Mulk","وَيَقُولُونَ مَتَىٰ هَٰذَا الْوَعْدُ إِن كُنتُمْ صَادِقِينَ","Они говорят: «Когда же исполнится это обещание, если вы говорите правду?»","And they say, When is this promise, if you should be truthful?"],
[67,26,"Al-Mulk","قُلْ إِنَّمَا الْعِلْمُ عِندَ اللَّهِ وَإِنَّمَا أَنَا نَذِيرٌ مُّبِينٌ","Скажи: «Знание об этом принадлежит только Аллаху, а я — лишь ясный предостерегающий».","Say, The knowledge is only with Allah, and I am only a clear warner"],
[67,27,"Al-Mulk","فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا وَقِيلَ هَٰذَا الَّذِي كُنتُم بِهِ تَدَّعُونَ","Когда же они увидят его близко, лица неверующих помрачнеют, и будет сказано: «Вот то, чего вы добивались».","But when they see it approaching, the faces of those who disbelieved will be distressed, and it will be said, This is that for which you used to call"],
[67,28,"Al-Mulk","قُلْ أَرَأَيْتُمْ إِنْ أَهْلَكَنِيَ اللَّهُ وَمَن مَّعِيَ أَوْ رَحِمَنَا فَمَن يُجِيرُ الْكَافِرِينَ مِنْ عَذَابٍ أَلِيمٍ","Скажи: «Скажите мне: если Аллах погубит меня и тех, кто со мной, или помилует нас, то кто защитит неверующих от мучительных страданий?»","Say, Have you considered: whether Allah should cause my death and those with me or have mercy upon us, who can protect the disbelievers from a painful punishment?"],
[67,29,"Al-Mulk","قُلْ هُوَ الرَّحْمَٰنُ آمَنَّا بِهِ وَعَلَيْهِ تَوَكَّلْنَا فَسَتَعْلَمُونَ مَنْ هُوَ فِي ضَلَالٍ مُّبِينٍ","Скажи: «Он — Милостивый. Мы уверовали в Него и на Него уповаем. Вы узнаете, кто пребывает в явном заблуждении».","Say, He is the Most Merciful; we have believed in Him, and upon Him we have relied. And you will know who it is that is in clear error"],
[67,30,"Al-Mulk","قُلْ أَرَأَيْتُمْ إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا فَمَن يَأْتِيكُم بِمَاءٍ مَّعِينٍ","Скажи: «Скажите мне: если ваша вода уйдёт в землю, то кто принесёт вам проточную воду?»","Say, Have you considered: if your water was to become sunken into the earth, then who could bring you flowing water?"],

function qGet(s,a){return QB.find(r=>r[0]===s&&r[1]===a)||null;}
function qNext(s,a){const i=QB.findIndex(r=>r[0]===s&&r[1]===a);return i>=0&&i<QB.length-1?QB[i+1]:null;}
function qPrev(s,a){const i=QB.findIndex(r=>r[0]===s&&r[1]===a);return i>0?QB[i-1]:null;}
function qFmt(r,lang){if(!r)return null;const tr=lang==="en"?r[5]:r[4];return{s:r[0],a:r[1],name:r[2],arabic:r[3],tr};}

const APP_VER = 'v2.5';
let apiKey = localStorage.getItem('qk')||'';
let mode   = localStorage.getItem('qm')||'manual';
document.getElementById('apiKey').value = apiKey;
applyMode(mode);

// 4.8 Arabic chars per second
const CHARS_PER_SEC = 4.8;
function ayahDurationMs(row){
  if(!row)return 4000;
  const chars=row[3].replace(/\s/g,'').length;
  return Math.max(1500, Math.min(22000, (chars/CHARS_PER_SEC)*1000));
}

// ══ Settings ══════════════════════════════════
function toggleSettings(){
  const p=document.getElementById('sp');
  const o=p.classList.toggle('open');
  document.getElementById('gearBtn').classList.toggle('open',o);
}
function closeSettings(){
  document.getElementById('sp').classList.remove('open');
  document.getElementById('gearBtn').classList.remove('open');
}
function saveS(){
  apiKey=document.getElementById('apiKey').value.trim();
  localStorage.setItem('qk',apiKey);
  localStorage.setItem('qm',mode);
  closeSettings();
}
document.addEventListener('click',e=>{
  const p=document.getElementById('sp'),g=document.getElementById('gearBtn');
  if(p.classList.contains('open')&&!p.contains(e.target)&&!g.contains(e.target))closeSettings();
});
function setMode(m){mode=m;applyMode(m);}
function applyMode(m){
  document.getElementById('mM').classList.toggle('active',m==='manual');
  document.getElementById('mA').classList.toggle('active',m==='auto');
}
function getLang(){return document.getElementById('lang').value||'ru';}

async function toggleRec(){
  recOn?(mode==='manual'?stopManual():stopLive()):startRec();
}

async function startRec(){
  if(!apiKey){alert('Введите API ключ в настройках ⚙️');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true}});
    allChunks=[];pendChunks=[];rollingBuf=[];win=[null,null,null];
    liveState='idle';
    if(pollIv){clearInterval(pollIv);pollIv=null;}
    if(advTmr){clearTimeout(advTmr);advTmr=null;}

    const m=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
    mime=m||'audio/mp4';
    mediaRec=new MediaRecorder(stream,m?{mimeType:m}:{});
    mediaRec.ondataavailable=e=>{if(e.data.size>0){allChunks.push(e.data);pendChunks.push(e.data);rollingBuf.push(e.data);if(rollingBuf.length>60)rollingBuf.shift();}};
    mediaRec.start(100);
    recOn=true;sliceStart=Date.now();

    document.getElementById('mic').classList.add('on');
    setIdle('Слушаем...',true);

    timerSec=0;
    timerIv=setInterval(()=>{
      timerSec++;
      document.getElementById('tmr').textContent=
        String(Math.floor(timerSec/60)).padStart(2,'0')+':'+String(timerSec%60).padStart(2,'0');
    },1000);

    if(mode==='auto')startLive();
  }catch(e){alert('Микрофон: '+e.message);}
}

async function stopManual(){
  recOn=false;clearInterval(timerIv);
  document.getElementById('tmr').textContent='';
  if(mediaRec?.state!=='inactive'){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}
  document.getElementById('mic').classList.remove('on');
  document.getElementById('mic').classList.add('busy');
  setIdle('Распознаём...',false);
  await new Promise(r=>setTimeout(r,300));
  const ch=[...allChunks];allChunks=[];
  await doManual(ch);
  document.getElementById('mic').classList.remove('busy');
}

function stopLive(){
  recOn=false;clearInterval(timerIv);
  if(pollIv){clearInterval(pollIv);pollIv=null;}
  if(advTmr){clearTimeout(advTmr);advTmr=null;}
  liveState='idle'; rollingBuf=[];
  document.getElementById('tmr').textContent='';
  document.getElementById('rukuBadge').classList.remove('on');
  if(mediaRec?.state!=='inactive'){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}
  document.getElementById('mic').classList.remove('on');
}

// ══ MANUAL MODE ═══════════════════════════════
async function doManual(chunks){
  if(!chunks.length)return;
  try{
    const blob=new Blob(chunks,{type:mime});
    const fd=new FormData();
    fd.append('file',blob,'a.'+(mime.includes('webm')?'webm':'mp4'));
    fd.append('model','whisper-1');fd.append('language','ar');
    fd.append('prompt','بسم الله الرحمن الرحيم قرآن كريم');
    const wr=await fetch('https://api.openai.com/v1/audio/transcriptions',{method:'POST',headers:{Authorization:'Bearer '+apiKey},body:fd});
    if(!wr.ok)return;
    const{text}=await wr.json();if(!text?.trim())return;

    const lg=getLang();
    const gr=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body:JSON.stringify({model:'gpt-4o',max_tokens:1000,messages:[{
        role:'system',
        content:`Quran expert. Identify ALL ayahs recited in order. For each return surah number, ayah number only.
JSON array only: [{"s":78,"a":1},{"s":78,"a":2},...] — empty array if nothing.`
      },{role:'user',content:'"'+text.trim()+'"'}]})
    });
    if(!gr.ok)return;
    const raw=(await gr.json()).choices[0]?.message?.content||'';
    let arr=[];try{arr=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{}
    if(!Array.isArray(arr)||!arr.length)return;

    // Render as scrollable list
    showList(arr.map(x=>{const r=qGet(x.s,x.a);return qFmt(r,lg)||{s:x.s,a:x.a,name:'',arabic:'',tr:''}}));
  }catch(e){}
  document.getElementById('mic').classList.remove('busy');
}

function showList(ayahs){
  document.getElementById('idle').style.display='none';
  document.getElementById('stage').classList.remove('on');
  let list=document.getElementById('mlist');
  if(!list){list=document.createElement('div');list.id='mlist';list.style.cssText='flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:24px;padding:8px 0 20px;';
    document.getElementById('stage').parentNode.insertBefore(list,document.getElementById('stage'));}
  list.innerHTML='';list.style.display='flex';
  ayahs.forEach((r,i)=>{
    setTimeout(()=>{
      const d=document.createElement('div');
      d.style.cssText=i>0?'border-top:1px solid #161616;padding-top:24px;':'';
      d.innerHTML=`<div style="font-family:'Amiri',serif;font-size:clamp(1.1rem,3.4vw,1.75rem);line-height:1.9;direction:rtl;text-align:right;color:#f0f0f0;margin-bottom:6px">${r.arabic||''}</div>
<div style="font-size:clamp(.76rem,1.7vw,.9rem);line-height:1.6;color:#999;font-weight:300">${r.tr||''}</div>
<div style="margin-top:5px;font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;color:#222">${r.name||''} · ${r.s}:${r.a}</div>`;
      list.appendChild(d);
      setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'end'}),80);
    },i*130);
  });
}

// ══ LIVE MODE ══════════════════════════════════
// v3.0: единый цикл каждые 5с — Whisper слушает, GPT решает действие
//
// GPT возвращает одно из:
//   {"action":"recite","s":67,"a":5}  — нашли аят, показываем/корректируем
//   {"action":"ruku"}                 — Аллаху Акбар / поклон / саджда
//   {"action":"fatiha"}               — имам читает Аль-Фатиху
//   {"action":"silence"}              — тишина, неразборчиво, ждём
//   {"action":"unknown"}              — не Коран, ждём

const CHARS_PER_SEC_LIVE = 7.2;
function ayahMs(row){
  if(!row)return 3000;
  const chars=row[3].replace(/\s/g,'').length;
  return Math.max(1200,Math.min(20000,(chars/CHARS_PER_SEC_LIVE)*1000));
}
function ayahDurationMs(r){return ayahMs(r);}

let liveState='idle';   // idle | running | paused
let pollIv=null;
let pollRunning=false;

// Stub — no longer needed
function stopRukuDetector(){}
function startRukuDetector(){}
let anchorDone=false,anchorRunning=false,anchorTimer=null;
function retryAnchor(){}

function startLive(){
  liveState='idle';
  pollRunning=false;
  if(pollIv){clearInterval(pollIv);pollIv=null;}
  pollIv=setInterval(doPoll,5000);
}

// ── Main 5s poll ──────────────────────────────
async function doPoll(){
  if(!recOn||pollRunning)return;
  const chunks=[...rollingBuf]; // fresh last ~6s, never stale
  if(!chunks.length)return;

  pollRunning=true;
  const lg=getLang();

  try{
    // Step 1: Whisper — no language lock so Allahu Akbar isn't filtered
    const blob=new Blob(chunks,{type:mime});
    const fd=new FormData();
    fd.append('file',blob,'p.'+(mime.includes('webm')?'webm':'mp4'));
    fd.append('model','whisper-1');
    // NO language param — lets Whisper transcribe Arabic + detect Allahu Akbar freely
    fd.append('prompt','الله أكبر الله أكبر بسم الله الرحمن الرحيم الحمد لله');
    const wr=await fetch('https://api.openai.com/v1/audio/transcriptions',
      {method:'POST',headers:{Authorization:'Bearer '+apiKey},body:fd});
    if(!wr.ok){pollRunning=false;return;}
    const{text}=await wr.json();
    if(!text?.trim()){pollRunning=false;return;}

    const raw=text.trim();
    console.log('[poll]',liveState,'→',raw.slice(0,90));

    // Step 2: Fast local check for Allahu Akbar (no GPT needed)
    const norm=raw.replace(/[\u064B-\u065F]/g,'').replace(/\s+/g,'');
    const hasAkbar=
      norm.includes('اللهأكبر')||
      norm.includes('أللهأكبر')||
      /\bالله\s*أكبر\b/.test(raw)||
      /allahu\s*akbar/i.test(raw)||
      /\bakbar\b/i.test(raw);

    if(hasAkbar){
      console.log('[poll] AKBAR detected locally →',raw);
      handleAction({action:'ruku'},lg);
      pollRunning=false;
      return;
    }

    // Step 3: Fast check for Fatiha locally
    const hasFatiha=
      norm.includes('الحمدلله')||
      norm.includes('بسماللهالرحمن')||
      norm.includes('ربالعالمين')||
      /alhamdu\s*lillah/i.test(raw);

    if(hasFatiha && liveState==='paused'){
      console.log('[poll] FATIHA detected locally');
      handleAction({action:'fatiha'},lg);
      pollRunning=false;
      return;
    }

    // Step 4: GPT identifies which ayah (only for reciting/unknown state)
    const curCtx=win[1]
      ?`Currently showing: Surah ${win[1].s} Ayah ${win[1].a}.`
      :'Nothing shown yet.';

    const gr=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body:JSON.stringify({model:'gpt-4o',max_tokens:60,messages:[{
        role:'system',
        content:`Quran expert. ${curCtx} Which ayah is being recited? Be generous with errors.
If Al-Fatiha (surah 1): {"action":"fatiha"}
If unclear/silence/dhikr: {"action":"silence"}
Otherwise: {"action":"recite","s":67,"a":3}
Return ONLY JSON.`
      },{role:'user',content:`"${raw}"`}]})
    });
    if(!gr.ok){pollRunning=false;return;}

    const graw=(await gr.json()).choices[0]?.message?.content||'';
    let res={};
    try{res=JSON.parse(graw.replace(/```json|```/g,'').trim());}catch{pollRunning=false;return;}
    console.log('[poll] GPT →',JSON.stringify(res));
    handleAction(res,lg);

  }catch(e){console.warn('[poll]',e);}
  pollRunning=false;
}

function handleAction(res,lg){
  switch(res.action){

    case 'recite':{
      if(!res.s||!res.a)break;
      const row=qGet(res.s,res.a);
      if(!row)break;
      const curKey=win[1]?win[1].s+':'+win[1].a:null;
      const newKey=res.s+':'+res.a;
      if(curKey===newKey){
        // Timer is on track — nothing to do
        break;
      }
      // Re-anchor to detected position
      if(advTmr){clearTimeout(advTmr);advTmr=null;}
      showRukuOverlay(false);
      liveState='running';
      const prvRow=qPrev(row[0],row[1]);
      const nxtRow=qNext(row[0],row[1]);
      win=[prvRow?qFmt(prvRow,lg):null, qFmt(row,lg), nxtRow?qFmt(nxtRow,lg):null];
      renderWin();
      // Assume we're ~halfway through current ayah
      scheduleAdvance(Math.round(ayahMs(row)*0.5),lg);
      break;
    }

    case 'ruku':{
      if(liveState!=='paused'){
        liveState='paused';
        if(advTmr){clearTimeout(advTmr);advTmr=null;}
        showRukuOverlay(true,'руку / саджда');
      }
      break;
    }

    case 'fatiha':{
      liveState='paused';
      if(advTmr){clearTimeout(advTmr);advTmr=null;}
      showRukuOverlay(false);
      const f1=qGet(1,1),f2=qGet(1,2);
      win=[null, f1?qFmt(f1,lg):null, f2?qFmt(f2,lg):null];
      renderWin();
      break;
    }

    case 'silence':
    default:
      // No change — let advance timer run
      break;
  }
}

function showRukuOverlay(show,label='руку — пауза'){
  const badge=document.getElementById('rukuBadge');
  const txt=document.getElementById('rukuTxt');
  if(show){
    badge.classList.add('on');
    txt.textContent=label;
    if(win[1])document.getElementById('rfCur').textContent='— '+label+' —';
  }else{
    badge.classList.remove('on');
  }
}

function scheduleAdvance(delayMs,lg){
  if(advTmr){clearTimeout(advTmr);advTmr=null;}
  if(!recOn||liveState==='paused')return;
  advTmr=setTimeout(()=>doAdvance(lg),delayMs);
}

function doAdvance(lg){
  advTmr=null;
  if(!recOn||liveState==='paused'||!win[2])return;
  const newPrev=win[1];
  const newCur=win[2];
  const newCurRow=newCur?qGet(newCur.s,newCur.a):null;
  const newNxtRow=newCurRow?qNext(newCurRow[0],newCurRow[1]):null;
  win=[newPrev,newCur,newNxtRow?qFmt(newNxtRow,lg):null];
  renderWin();
  if(newCurRow)scheduleAdvance(ayahMs(newCurRow),lg);
}

// ══ Render 3-slot ═════════════════════════════
function renderWin(){
  const ml=document.getElementById('mlist');if(ml)ml.style.display='none';
  document.getElementById('idle').style.display='none';
  document.getElementById('stage').classList.add('on');
  fill('Prev',win[0]);fill('Cur',win[1]);fill('Nxt',win[2]);
}
function fill(slot,ayah){
  document.getElementById('ar'+slot).textContent=ayah?ayah.arabic:'';
  document.getElementById('tr'+slot).textContent=ayah?ayah.tr:'';
  document.getElementById('rf'+slot).textContent=ayah?(ayah.name+' · '+ayah.s+':'+ayah.a):'';
}

// ══ Idle ══════════════════════════════════════
function setIdle(label,live){
  document.getElementById('idleLbl').textContent=label;
  document.getElementById('dots').classList.toggle('on',live);
}
</script>
