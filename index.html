<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quran Live</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
height: 100%;
background: #0d0d0d;
color: #fff;
font-family: ‘Inter’, sans-serif;
overflow: hidden;
}

/* ══ LAYOUT — landscape split ══════════════════════════ */
.app {
display: grid;
/* landscape: left=content, right=controls */
grid-template-columns: 1fr 88px;
grid-template-rows: 100%;
height: 100%;
}

/* portrait fallback */
@media (orientation: portrait) {
.app {
grid-template-columns: 1fr;
grid-template-rows: 1fr 90px;
}
.sidebar { flex-direction: row; justify-content: center; gap: 24px; padding: 0 24px 20px; border-left: none; border-top: 1px solid #1a1a1a; }
.content { padding: 24px 28px 0; }
}

/* ══ LEFT — scrollable content ════════════════════════ */
.content {
padding: 0 36px 0 36px;
display: flex;
flex-direction: column;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* top row inside content */
.content-top {
display: flex;
align-items: center;
justify-content: space-between;
padding: 18px 0 16px;
flex-shrink: 0;
}
.app-title {
font-size: 0.68rem;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #383838;
font-weight: 300;
}

/* gear */
.gear-btn {
width: 32px; height: 32px;
border: none; background: none;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: #383838; transition: color 0.2s;
border-radius: 50%; position: relative;
}
.gear-btn:hover, .gear-btn.open { color: #aaa; }
.gear-btn svg { width: 16px; height: 16px; }

/* ══ SETTINGS PANEL ════════════════════════════════════ */
.settings-panel {
position: fixed;
top: 52px; right: 96px;
width: 270px;
background: #161616;
border: 1px solid #242424;
border-radius: 14px;
padding: 18px;
z-index: 400;
display: none;
box-shadow: 0 20px 60px rgba(0,0,0,0.95);
}
.settings-panel.open { display: block; }

@media (orientation: portrait) {
.settings-panel { right: 16px; top: 56px; }
}

.s-label {
font-size: 0.65rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #444;
margin-bottom: 7px;
margin-top: 14px;
display: block;
}
.s-label:first-child { margin-top: 0; }

.settings-panel input,
.settings-panel select {
width: 100%;
background: #0d0d0d;
border: 1px solid #242424;
border-radius: 8px;
padding: 9px 12px;
color: #ddd;
font-family: ‘Inter’, sans-serif;
font-size: 0.85rem;
outline: none;
}
.settings-panel input:focus,
.settings-panel select:focus { border-color: #3a3a3a; }
.settings-panel select option { background: #161616; }

/* Mode toggle inside settings */
.mode-toggle {
display: flex;
background: #0d0d0d;
border: 1px solid #242424;
border-radius: 8px;
overflow: hidden;
}
.mode-btn {
flex: 1; padding: 9px 0;
border: none; background: transparent;
color: #444;
font-family: ‘Inter’, sans-serif;
font-size: 0.78rem;
font-weight: 400;
cursor: pointer;
transition: all 0.2s;
letter-spacing: 0.04em;
}
.mode-btn.active { background: #1e1e1e; color: #ddd; }

.btn-save {
width: 100%; margin-top: 14px; padding: 9px;
background: #fff; color: #000;
border: none; border-radius: 8px;
font-family: ‘Inter’, sans-serif;
font-size: 0.82rem; font-weight: 500;
cursor: pointer; transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.85; }

/* ══ AYAH LIST ═════════════════════════════════════════ */
.ayah-list {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
gap: 32px;
padding: 12px 0 24px;
min-height: 0;
}

/* single ayah block */
.ayah-block {
opacity: 0;
transform: translateY(10px);
animation: fadeUp 0.55s ease forwards;
}
@keyframes fadeUp {
to { opacity: 1; transform: translateY(0); }
}

.arabic-line {
font-family: ‘Amiri’, serif;
font-size: clamp(1.4rem, 3.5vw, 2.1rem);
line-height: 1.85;
direction: rtl;
color: #f0f0f0;
margin-bottom: 10px;
}

.trans-line {
font-size: clamp(0.88rem, 1.8vw, 1rem);
line-height: 1.7;
color: #aaa;
font-weight: 300;
}

.ref-line {
margin-top: 8px;
font-size: 0.62rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: #2e2e2e;
}

/* divider between ayahs */
.ayah-block + .ayah-block {
border-top: 1px solid #1a1a1a;
padding-top: 32px;
}

/* ══ IDLE STATE ════════════════════════════════════════ */
.idle-wrap {
flex: 1;
display: flex;
flex-direction: column;
align-items: flex-start;
justify-content: center;
gap: 10px;
}
.idle-dots { display: flex; gap: 6px; align-items: center; }
.idle-dots span {
width: 4px; height: 4px; border-radius: 50%;
background: #282828;
animation: dp 1.4s ease-in-out infinite;
}
.idle-dots span:nth-child(2) { animation-delay: 0.2s; }
.idle-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dp {
0%,80%,100% { opacity:0.3; transform:scale(0.8); }
40% { opacity:1; transform:scale(1); }
}
.idle-dots.live span { background: #ccc; }
.idle-text {
font-size: 0.7rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: #2e2e2e;
}

/* ══ RIGHT SIDEBAR — controls ══════════════════════════ */
.sidebar {
border-left: 1px solid #161616;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
padding: 20px 0;
flex-shrink: 0;
}

/* Mic */
.mic-btn {
width: 60px; height: 60px;
border-radius: 50%;
border: 1.5px solid #242424;
background: #111;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.25s;
position: relative;
flex-shrink: 0;
}
.mic-btn svg { width: 22px; height: 22px; fill: #ccc; transition: fill 0.2s; }
.mic-btn:hover { border-color: #555; }

.mic-btn.on { background: #f0f0f0; border-color: #f0f0f0; }
.mic-btn.on svg { fill: #000; }
.mic-btn.on::after {
content: ‘’;
position: absolute; inset: -7px;
border-radius: 50%;
border: 1px solid rgba(255,255,255,0.1);
animation: ring 1.8s ease-out infinite;
}
@keyframes ring {
0% { transform: scale(1); opacity: 1; }
100% { transform: scale(1.55); opacity: 0; }
}
.mic-btn.thinking { border-color: #1e1e1e; }
.mic-btn.thinking svg { fill: #333; }

/* Timer */
.timer {
font-size: 0.65rem;
color: #2e2e2e;
letter-spacing: 0.08em;
font-variant-numeric: tabular-nums;
text-align: center;
}

/* Overlay — MUST be below settings panel (z-index 299 < 300) */
.overlay { display:none; }
</style>

</head>

<script>
// ── State ────────────────────────────────────────────
let apiKey = localStorage.getItem('qk') || '';
let mode   = localStorage.getItem('qmode') || 'manual';
let mediaRec = null;
let allChunks = [], pendChunks = [];
let recOn = false, procOn = false;
let timerSec = 0, timerIv = null, autoIv = null;
let lastRef = null;
let mime = 'audio/mp4';

// init
document.getElementById('apiKey').value = apiKey;
applyMode(mode);

// ── Settings ─────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const isOpen = panel.classList.toggle('open');
  document.getElementById('gearBtn').classList.toggle('open', isOpen);
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('gearBtn').classList.remove('open');
}
function saveSettings() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('qk', apiKey);
  localStorage.setItem('qmode', mode);
  closeSettings();
}

// Close settings when tapping outside
document.addEventListener('click', function(e) {
  const panel = document.getElementById('settingsPanel');
  const gear  = document.getElementById('gearBtn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !gear.contains(e.target)) {
    closeSettings();
  }
});
function setMode(m) {
  mode = m;
  applyMode(m);
}
function applyMode(m) {
  document.getElementById('mManual').classList.toggle('active', m === 'manual');
  document.getElementById('mAuto').classList.toggle('active', m === 'auto');
}

// ── Recording ─────────────────────────────────────────
async function toggleRec() {
  if (recOn) {
    mode === 'manual' ? await stopProcess() : stopStream();
  } else {
    await startRec();
  }
}

async function startRec() {
  if (!apiKey) { alert('Введите API ключ в настройках ⚙️'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    allChunks = []; pendChunks = []; lastRef = null;
    const m = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
            : MediaRecorder.isTypeSupported('audio/mp4')  ? 'audio/mp4' : '';
    mime = m || 'audio/mp4';
    mediaRec = new MediaRecorder(stream, m ? { mimeType: m } : {});
    mediaRec.ondataavailable = e => {
      if (e.data.size > 0) { allChunks.push(e.data); pendChunks.push(e.data); }
    };
    mediaRec.start(100);
    recOn = true;

    document.getElementById('micBtn').classList.add('on');
    setIdle('Слушаем...', true);

    timerSec = 0;
    timerIv = setInterval(() => {
      timerSec++;
      const mm = String(Math.floor(timerSec/60)).padStart(2,'0');
      const ss = String(timerSec%60).padStart(2,'0');
      document.getElementById('timerEl').textContent = mm+':'+ss;
    }, 1000);

    if (mode === 'auto') {
      autoIv = setInterval(() => {
        if (!procOn && pendChunks.length > 0) {
          const b = [...pendChunks]; pendChunks = [];
          processAudio(b, false);
        }
      }, 5000);
    }
  } catch(e) { alert('Микрофон недоступен: ' + e.message); }
}

async function stopProcess() {
  recOn = false;
  clearInterval(timerIv); clearInterval(autoIv);
  document.getElementById('timerEl').textContent = '';
  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.stop(); mediaRec.stream.getTracks().forEach(t => t.stop());
  }
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').classList.add('thinking');
  setIdle('Распознаём...', false);

  await new Promise(r => setTimeout(r, 350));
  const ch = [...allChunks]; allChunks = [];
  await processAudio(ch, true); // true = manual (return ALL ayahs)
  document.getElementById('micBtn').classList.remove('thinking');
  if (!document.getElementById('ayahList').children.length) setIdle('Нажмите микрофон', false);
}

function stopStream() {
  recOn = false;
  clearInterval(timerIv); clearInterval(autoIv);
  document.getElementById('timerEl').textContent = '';
  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.stop(); mediaRec.stream.getTracks().forEach(t => t.stop());
  }
  document.getElementById('micBtn').classList.remove('on');
  if (!document.getElementById('ayahList').children.length) setIdle('Нажмите микрофон', false);
}

// ── Process ───────────────────────────────────────────
async function processAudio(chunks, isManual) {
  if (!chunks.length || procOn) return;
  procOn = true;

  try {
    const ext  = mime.includes('webm') ? 'webm' : 'mp4';
    const blob = new Blob(chunks, { type: mime });
    const fd   = new FormData();
    fd.append('file', blob, 'a.' + ext);
    fd.append('model', 'whisper-1');
    fd.append('language', 'ar');
    fd.append('prompt', 'بسم الله الرحمن الرحيم قرآن كريم');

    const wr = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST', headers: { Authorization: 'Bearer ' + apiKey }, body: fd
    });
    if (!wr.ok) { procOn = false; if (recOn) setIdle('Слушаем...', true); return; }

    const { text } = await wr.json();
    if (!text?.trim()) { procOn = false; if (recOn) setIdle('Слушаем...', true); return; }

    const lang = document.getElementById('langSelect').value;
    const lm = { ru:'Russian', en:'English', tr:'Turkish', uz:'Uzbek', kk:'Kazakh', tj:'Tajik', de:'German', fr:'French' };
    const ln = lm[lang] || 'Russian';
    const ctx = lastRef ? `Previous ayah: Surah ${lastRef.s} Ayah ${lastRef.a}. Next likely nearby.` : '';

    // Manual: ask for ALL ayahs in the recording; Auto: single best match
    const systemPrompt = isManual
      ? `You are a Quran expert. The user recorded multiple ayahs being recited.
Identify ALL Quran ayahs present in the transcription (could be 1 to 10+).
Return COMPLETE full text for each ayah even if only partially heard.
${ctx}
Respond ONLY with JSON array (no markdown):
[{"s":2,"a":255,"name":"Al-Baqarah","arabic":"FULL AYAH TEXT","tr":"translation in ${ln}"},...]
If nothing matches: []`
      : `You are a Quran expert. Find the single best matching Quran ayah for this transcription.
Return COMPLETE full ayah text always, even if only part was heard.
${ctx}
Respond ONLY with JSON (no markdown):
{"found":true,"s":2,"a":255,"name":"Al-Baqarah","arabic":"FULL AYAH","tr":"translation in ${ln}"}
If no match: {"found":false}`;

    const gr = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: isManual ? 2000 : 600,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: 'Transcription: "' + text.trim() + '"' }
        ]
      })
    });
    if (!gr.ok) { procOn = false; if (recOn) setIdle('Слушаем...', true); return; }

    const gd  = await gr.json();
    const raw = (gd.choices[0]?.message?.content || '').replace(/```json|```/g,'').trim();

    if (isManual) {
      // Expect array
      let arr = [];
      try { arr = JSON.parse(raw); } catch { /* silent */ }
      if (Array.isArray(arr) && arr.length > 0) {
        // Clear and show all
        clearAyahs();
        arr.forEach((r, i) => {
          setTimeout(() => addAyahBlock(r), i * 120);
        });
        if (arr.length > 0) lastRef = { s: arr[arr.length-1].s, a: arr[arr.length-1].a };
      }
    } else {
      // Single ayah auto mode
      let res = {};
      try { res = JSON.parse(raw); } catch { /* silent */ }
      if (res.found) {
        const ref = res.s + ':' + res.a;
        if (lastRef && lastRef.s+':'+lastRef.a === ref) {
          // Same ayah — skip
        } else {
          lastRef = { s: res.s, a: res.a };
          clearAyahs();
          addAyahBlock(res);
        }
      }
    }

  } catch(e) { /* silent */ }

  procOn = false;
  if (recOn && mode === 'auto') setIdle('Слушаем...', true);
}

// ── Render ────────────────────────────────────────────
function clearAyahs() {
  const list = document.getElementById('ayahList');
  const idle = document.getElementById('idleWrap');
  list.innerHTML = '';
  list.style.display = 'none';
  idle.style.display = 'flex';
}

function addAyahBlock(r) {
  const list = document.getElementById('ayahList');
  const idle = document.getElementById('idleWrap');

  // Show list, hide idle
  idle.style.display = 'none';
  list.style.display = 'flex';

  const block = document.createElement('div');
  block.className = 'ayah-block';
  block.innerHTML = `
    <div class="arabic-line">${r.arabic}</div>
    <div class="trans-line">${r.tr}</div>
    <div class="ref-line">${r.name || ''} · ${r.s}:${r.a}</div>
  `;
  list.appendChild(block);

  // Scroll to latest
  setTimeout(() => {
    block.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 200);
}

function setIdle(label, live) {
  document.getElementById('idleText').textContent = label;
  document.getElementById('idleDots').classList.toggle('live', live);
}
</script>

</body>
