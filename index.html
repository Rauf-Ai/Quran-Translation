<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quran Live</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
background: #0d0d0d;
color: #fff;
font-family: ‘Inter’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
}

/* Top bar */
.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 20px 24px 16px;
position: relative;
z-index: 100;
}

.app-title {
font-size: 0.72rem;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #444;
font-weight: 300;
}

.gear-btn {
width: 36px; height: 36px;
border: none; background: none;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: #444;
transition: color 0.2s;
border-radius: 50%;
position: relative;
}
.gear-btn:hover { color: #fff; }
.gear-btn svg { width: 18px; height: 18px; }

/* Settings panel */
.settings-panel {
position: absolute;
top: 44px; right: 0;
width: 280px;
background: #161616;
border: 1px solid #252525;
border-radius: 14px;
padding: 20px;
z-index: 200;
display: none;
box-shadow: 0 24px 64px rgba(0,0,0,0.9);
}
.settings-panel.open { display: block; }

.settings-panel label {
display: block;
font-size: 0.68rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #444;
margin-bottom: 8px;
margin-top: 16px;
}
.settings-panel label:first-child { margin-top: 0; }

.settings-panel input,
.settings-panel select {
width: 100%;
background: #0d0d0d;
border: 1px solid #252525;
border-radius: 8px;
padding: 10px 12px;
color: #fff;
font-family: ‘Inter’, sans-serif;
font-size: 0.88rem;
outline: none;
}
.settings-panel input:focus,
.settings-panel select:focus { border-color: #444; }
.settings-panel select option { background: #161616; }

.btn-save {
width: 100%;
margin-top: 14px;
padding: 10px;
background: #fff;
color: #000;
border: none;
border-radius: 8px;
font-family: ‘Inter’, sans-serif;
font-size: 0.85rem;
font-weight: 500;
cursor: pointer;
transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.85; }

/* Main area */
.main {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 20px 28px 80px;
text-align: center;
}

/* Ayah display */
.ayah-wrap {
width: 100%;
max-width: 580px;
}

.arabic-text {
font-family: ‘Amiri’, serif;
font-size: clamp(1.5rem, 5.5vw, 2.4rem);
line-height: 2;
direction: rtl;
color: #fff;
opacity: 0;
transform: translateY(10px);
transition: opacity 0.6s ease, transform 0.6s ease;
}

.translation-text {
margin-top: 20px;
font-size: clamp(0.9rem, 2.8vw, 1.05rem);
line-height: 1.75;
color: #666;
font-weight: 300;
opacity: 0;
transform: translateY(10px);
transition: opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s;
}

.ref-text {
margin-top: 20px;
font-size: 0.68rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: #2e2e2e;
opacity: 0;
transition: opacity 0.6s ease 0.3s;
}

.ayah-wrap.show .arabic-text,
.ayah-wrap.show .translation-text,
.ayah-wrap.show .ref-text {
opacity: 1;
transform: translateY(0);
}

/* Idle state */
.idle-dots {
display: flex;
gap: 7px;
align-items: center;
justify-content: center;
margin-bottom: 14px;
}
.idle-dots span {
width: 4px; height: 4px;
border-radius: 50%;
background: #2a2a2a;
animation: dot-pulse 1.4s ease-in-out infinite;
}
.idle-dots span:nth-child(2) { animation-delay: 0.2s; }
.idle-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
40% { opacity: 1; transform: scale(1); }
}

.idle-dots.active span { background: #fff; }

.idle-label {
font-size: 0.7rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: #2e2e2e;
}

/* Bottom */
.bottom {
position: fixed;
bottom: 0; left: 0; right: 0;
padding: 20px 24px 44px;
display: flex;
align-items: center;
justify-content: center;
gap: 28px;
background: linear-gradient(to top, #0d0d0d 60%, transparent);
}

.mic-btn {
width: 68px; height: 68px;
border-radius: 50%;
border: 1.5px solid #222;
background: #111;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.25s;
position: relative;
flex-shrink: 0;
}
.mic-btn svg { width: 24px; height: 24px; fill: #fff; transition: fill 0.2s; }

.mic-btn.on {
background: #fff;
border-color: #fff;
}
.mic-btn.on svg { fill: #000; }
.mic-btn.on::after {
content: ‘’;
position: absolute;
inset: -6px;
border-radius: 50%;
border: 1px solid rgba(255,255,255,0.12);
animation: mic-ring 1.6s ease-out infinite;
}
@keyframes mic-ring {
0% { transform: scale(1); opacity: 1; }
100% { transform: scale(1.5); opacity: 0; }
}

.mic-btn.thinking { border-color: #1e1e1e; }
.mic-btn.thinking svg { fill: #333; }

.timer {
font-size: 0.72rem;
color: #2e2e2e;
letter-spacing: 0.1em;
font-variant-numeric: tabular-nums;
width: 36px;
}

/* Mode toggle */
.mode-row {
width: 36px;
display: flex;
align-items: center;
justify-content: center;
}
.mode-pill {
display: flex;
background: #111;
border: 1px solid #1e1e1e;
border-radius: 16px;
overflow: hidden;
}
.mpb {
padding: 5px 10px;
border: none; background: transparent;
color: #333;
font-family: ‘Inter’, sans-serif;
font-size: 0.62rem;
letter-spacing: 0.08em;
text-transform: uppercase;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}
.mpb.on { background: #1e1e1e; color: #aaa; }

/* Overlay */
.overlay {
display: none;
position: fixed; inset: 0; z-index: 90;
}
.overlay.open { display: block; }
</style>

</head>
<body>

<!-- Content -->

<div class="main" id="mainArea">
  <!-- Idle -->
  <div id="idleBlock">
    <div class="idle-dots" id="idleDots">
      <span></span><span></span><span></span>

<!-- Bottom -->

<div class="bottom">
  <div class="timer" id="timerEl"></div>

  <button class="mic-btn" id="micBtn" onclick="toggleRec()">
    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V22H8v2h8v-2h-3v-1.06A9 9 0 0 0 21 12v-2h-2z"/></svg>
  </button>

    <div class="mode-pill" id="modePill" style="display:none">
      <button class="mpb on" id="mManual" onclick="setMode('manual')">Руч</button>
      <button class="mpb" id="mAuto" onclick="setMode('auto')">Авто</button>
    </div>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('qk') || '';
let mediaRec = null;
let allChunks = [];
let pendChunks = [];
let recOn = false;
let procOn = false;
let mode = 'manual';
let timerSec = 0, timerIv = null, autoIv = null;
let lastRef = null;
let mime = 'audio/mp4';

document.getElementById('apiKey').value = apiKey;

// Settings
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function saveSettings() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('qk', apiKey);
  closeSettings();
}

// Mode
function setMode(m) {
  mode = m;
  document.getElementById('mManual').classList.toggle('on', m==='manual');
  document.getElementById('mAuto').classList.toggle('on', m==='auto');
}

// Record
async function toggleRec() {
  if (recOn) {
    if (mode === 'manual') await stopProcess();
    else stopStream();
  } else {
    await startRec();
  }
}

async function startRec() {
  if (!apiKey) { alert('Введите API ключ в настройках ⚙️'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });

    allChunks = []; pendChunks = [];
    const m = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
            : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    mime = m || 'audio/mp4';
    mediaRec = new MediaRecorder(stream, m ? { mimeType: m } : {});
    mediaRec.ondataavailable = e => {
      if (e.data.size > 0) { allChunks.push(e.data); pendChunks.push(e.data); }
    };
    mediaRec.start(100);
    recOn = true;
    lastRef = null;

    document.getElementById('micBtn').classList.add('on');
    document.getElementById('modePill').style.display = 'flex';
    setIdle('Слушаем...', true);

    timerSec = 0;
    timerIv = setInterval(() => {
      timerSec++;
      const mm = String(Math.floor(timerSec/60)).padStart(2,'0');
      const ss = String(timerSec%60).padStart(2,'0');
      document.getElementById('timerEl').textContent = mm+':'+ss;
    }, 1000);

    // Auto: slice every 5s
    if (mode === 'auto') {
      autoIv = setInterval(() => {
        if (!procOn && pendChunks.length > 0) {
          const b = [...pendChunks]; pendChunks = [];
          processAudio(b);
        }
      }, 5000);
    }
  } catch(e) { alert('Микрофон недоступен: ' + e.message); }
}

async function stopProcess() {
  recOn = false;
  clearInterval(timerIv); clearInterval(autoIv);
  document.getElementById('timerEl').textContent = '';
  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.stop();
    mediaRec.stream.getTracks().forEach(t => t.stop());
  }
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').classList.add('thinking');
  document.getElementById('modePill').style.display = 'none';
  setIdle('Распознаём...', false);

  await new Promise(r => setTimeout(r, 350));
  const ch = [...allChunks]; allChunks = [];
  await processAudio(ch);
  document.getElementById('micBtn').classList.remove('thinking');
}

function stopStream() {
  recOn = false;
  clearInterval(timerIv); clearInterval(autoIv);
  document.getElementById('timerEl').textContent = '';
  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.stop();
    mediaRec.stream.getTracks().forEach(t => t.stop());
  }
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('modePill').style.display = 'none';
  const hasAyah = document.getElementById('ayahWrap').style.display !== 'none';
  if (!hasAyah) setIdle('Нажмите для начала', false);
}

// Process
async function processAudio(chunks) {
  if (!chunks.length || procOn) return;
  procOn = true;

  try {
    const ext = mime.includes('webm') ? 'webm' : 'mp4';
    const blob = new Blob(chunks, { type: mime });
    const fd = new FormData();
    fd.append('file', blob, 'a.' + ext);
    fd.append('model', 'whisper-1');
    fd.append('language', 'ar');
    fd.append('prompt', 'بسم الله الرحمن الرحيم قرآن كريم');

    const wr = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + apiKey }, body: fd
    });
    if (!wr.ok) { procOn = false; if (recOn) setIdle('Слушаем...', true); return; }

    const { text } = await wr.json();
    if (!text?.trim()) { procOn = false; if (recOn) setIdle('Слушаем...', true); return; }

    const lang = document.getElementById('langSelect').value;
    const lm = { ru:'Russian',en:'English',tr:'Turkish',uz:'Uzbek',kk:'Kazakh',tj:'Tajik',de:'German',fr:'French' };
    const ln = lm[lang] || 'Russian';
    const ctx = lastRef ? `Previous: Surah ${lastRef.s} Ayah ${lastRef.a}. Next is likely nearby.` : '';

    const gr = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 600,
        messages: [
          { role: 'system', content: `Quran expert. Match transcription to Quran.
RULES: Return COMPLETE full ayah text always. Be generous with errors/partial text.
${ctx}
If matched, respond ONLY JSON no markdown:
{"found":true,"s":2,"a":255,"name":"Al-Baqarah","arabic":"FULL AYAH","tr":"translation in ${ln}"}
If no match: {"found":false}` },
          { role: 'user', content: 'Transcription: "' + text.trim() + '"' }
        ]
      })
    });
    if (!gr.ok) { procOn = false; if (recOn) setIdle('Слушаем...', true); return; }

    const gd = await gr.json();
    let res;
    try { res = JSON.parse((gd.choices[0]?.message?.content||'{}').replace(/```json|```/g,'').trim()); }
    catch { procOn = false; if (recOn) setIdle('Слушаем...', true); return; }

    if (res.found) {
      const ref = res.s + ':' + res.a;
      // Skip duplicate in auto mode
      if (mode === 'auto' && lastRef && lastRef.s+':'+lastRef.a === ref) {
        procOn = false; setIdle('Слушаем...', true); return;
      }
      lastRef = { s: res.s, a: res.a };
      showAyah(res);
    }
    // No match = keep silent, keep listening
  } catch(e) { /* silent */ }

  procOn = false;
  if (recOn && mode === 'auto') setIdle('Слушаем...', true);
}

function showAyah(res) {
  document.getElementById('idleBlock').style.display = 'none';
  const wrap = document.getElementById('ayahWrap');
  wrap.style.display = 'block';
  wrap.classList.remove('show');

  document.getElementById('arabicEl').textContent = res.arabic;
  document.getElementById('transEl').textContent = res.tr;
  document.getElementById('refEl').textContent = res.name + ' · ' + res.s + ':' + res.a;

  requestAnimationFrame(() => requestAnimationFrame(() => wrap.classList.add('show')));
}

function setIdle(label, active) {
  document.getElementById('idleLabel').textContent = label;
  document.getElementById('idleDots').classList.toggle('active', active);
}
</script>

</body>
