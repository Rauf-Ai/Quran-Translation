<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quran Live</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
height: 100%;
background: #0d0d0d;
color: #fff;
font-family: ‘Inter’, sans-serif;
overflow: hidden;
}

/* ══ LAYOUT — landscape split ══════════════════════════ */
.app {
display: grid;
/* landscape: left=content, right=controls */
grid-template-columns: 1fr 88px;
grid-template-rows: 100%;
height: 100%;
}

/* portrait fallback */
@media (orientation: portrait) {
.app {
grid-template-columns: 1fr;
grid-template-rows: 1fr 90px;
}
.sidebar { flex-direction: row; justify-content: center; gap: 24px; padding: 0 24px 20px; border-left: none; border-top: 1px solid #1a1a1a; }
.content { padding: 24px 28px 0; }
}

/* ══ LEFT — scrollable content ════════════════════════ */
.content {
padding: 0 36px 0 36px;
display: flex;
flex-direction: column;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* top row inside content */
.content-top {
display: flex;
align-items: center;
justify-content: space-between;
padding: 18px 0 16px;
flex-shrink: 0;
}
.app-title {
font-size: 0.68rem;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #383838;
font-weight: 300;
}

/* gear */
.gear-btn {
width: 32px; height: 32px;
border: none; background: none;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: #383838; transition: color 0.2s;
border-radius: 50%; position: relative;
}
.gear-btn:hover, .gear-btn.open { color: #aaa; }
.gear-btn svg { width: 16px; height: 16px; }

/* ══ SETTINGS PANEL ════════════════════════════════════ */
.settings-panel {
position: fixed;
top: 52px; right: 96px;
width: 270px;
background: #161616;
border: 1px solid #242424;
border-radius: 14px;
padding: 18px;
z-index: 400;
display: none;
box-shadow: 0 20px 60px rgba(0,0,0,0.95);
}
.settings-panel.open { display: block; }

@media (orientation: portrait) {
.settings-panel { right: 16px; top: 56px; }
}

.s-label {
font-size: 0.65rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #444;
margin-bottom: 7px;
margin-top: 14px;
display: block;
}
.s-label:first-child { margin-top: 0; }

.settings-panel input,
.settings-panel select {
width: 100%;
background: #0d0d0d;
border: 1px solid #242424;
border-radius: 8px;
padding: 9px 12px;
color: #ddd;
font-family: ‘Inter’, sans-serif;
font-size: 0.85rem;
outline: none;
}
.settings-panel input:focus,
.settings-panel select:focus { border-color: #3a3a3a; }
.settings-panel select option { background: #161616; }

/* Mode toggle inside settings */
.mode-toggle {
display: flex;
background: #0d0d0d;
border: 1px solid #242424;
border-radius: 8px;
overflow: hidden;
}
.mode-btn {
flex: 1; padding: 9px 0;
border: none; background: transparent;
color: #444;
font-family: ‘Inter’, sans-serif;
font-size: 0.78rem;
font-weight: 400;
cursor: pointer;
transition: all 0.2s;
letter-spacing: 0.04em;
}
.mode-btn.active { background: #1e1e1e; color: #ddd; }

.btn-save {
width: 100%; margin-top: 14px; padding: 9px;
background: #fff; color: #000;
border: none; border-radius: 8px;
font-family: ‘Inter’, sans-serif;
font-size: 0.82rem; font-weight: 500;
cursor: pointer; transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.85; }

/* ══ AYAH LIST ═════════════════════════════════════════ */
.ayah-list {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
gap: 32px;
padding: 12px 0 24px;
min-height: 0;
}

/* single ayah block */
.ayah-block {
opacity: 0;
transform: translateY(10px);
animation: fadeUp 0.55s ease forwards;
}
@keyframes fadeUp {
to { opacity: 1; transform: translateY(0); }
}

.arabic-line {
font-family: ‘Amiri’, serif;
font-size: clamp(1.4rem, 3.5vw, 2.1rem);
line-height: 1.85;
direction: rtl;
color: #f0f0f0;
margin-bottom: 10px;
}

.trans-line {
font-size: clamp(0.88rem, 1.8vw, 1rem);
line-height: 1.7;
color: #aaa;
font-weight: 300;
}

.ref-line {
margin-top: 8px;
font-size: 0.62rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: #2e2e2e;
}

/* Predicted (next) ayah — dimmed */
.ayah-block.predicted .arabic-line { color: #444; }
.ayah-block.predicted .trans-line  { color: #333; }
.ayah-block.predicted .ref-line    { color: #222; }

/* divider between ayahs */
.ayah-block + .ayah-block {
border-top: 1px solid #1a1a1a;
padding-top: 32px;
}

/* ══ IDLE STATE ════════════════════════════════════════ */
.idle-wrap {
flex: 1;
display: flex;
flex-direction: column;
align-items: flex-start;
justify-content: center;
gap: 10px;
}
.idle-dots { display: flex; gap: 6px; align-items: center; }
.idle-dots span {
width: 4px; height: 4px; border-radius: 50%;
background: #282828;
animation: dp 1.4s ease-in-out infinite;
}
.idle-dots span:nth-child(2) { animation-delay: 0.2s; }
.idle-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dp {
0%,80%,100% { opacity:0.3; transform:scale(0.8); }
40% { opacity:1; transform:scale(1); }
}
.idle-dots.live span { background: #ccc; }
.idle-text {
font-size: 0.7rem;
letter-spacing: 0.16em;
text-transform: uppercase;
color: #2e2e2e;
}

/* ══ RIGHT SIDEBAR — controls ══════════════════════════ */
.sidebar {
border-left: 1px solid #161616;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
padding: 20px 0;
flex-shrink: 0;
}

/* Mic */
.mic-btn {
width: 60px; height: 60px;
border-radius: 50%;
border: 1.5px solid #242424;
background: #111;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.25s;
position: relative;
flex-shrink: 0;
}
.mic-btn svg { width: 22px; height: 22px; fill: #ccc; transition: fill 0.2s; }
.mic-btn:hover { border-color: #555; }

.mic-btn.on { background: #f0f0f0; border-color: #f0f0f0; }
.mic-btn.on svg { fill: #000; }
.mic-btn.on::after {
content: ‘’;
position: absolute; inset: -7px;
border-radius: 50%;
border: 1px solid rgba(255,255,255,0.1);
animation: ring 1.8s ease-out infinite;
}
@keyframes ring {
0% { transform: scale(1); opacity: 1; }
100% { transform: scale(1.55); opacity: 0; }
}
.mic-btn.thinking { border-color: #1e1e1e; }
.mic-btn.thinking svg { fill: #333; }

/* Timer */
.timer {
font-size: 0.65rem;
color: #2e2e2e;
letter-spacing: 0.08em;
font-variant-numeric: tabular-nums;
text-align: center;
}

/* Overlay — MUST be below settings panel (z-index 299 < 300) */
.overlay { display:none; }
</style>

</head>

<script>
// ── State ────────────────────────────────────────────
let apiKey = localStorage.getItem('qk') || '';
let mode   = localStorage.getItem('qmode') || 'manual';
let mediaRec = null;
let allChunks = [], pendChunks = [];
let recOn = false, procOn = false;
let timerSec = 0, timerIv = null, autoIv = null;
let mime = 'audio/mp4';

// Live mode state
let shownAyahs = [];
let lastConfirmed = null;
let predictedBlock = null;
let liveQueue = [];       // queue of chunk batches waiting to be processed
let liveRunning = false;  // is the queue worker running

document.getElementById('apiKey').value = apiKey;
applyMode(mode);

// ── Settings ─────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const isOpen = panel.classList.toggle('open');
  document.getElementById('gearBtn').classList.toggle('open', isOpen);
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('gearBtn').classList.remove('open');
}
function saveSettings() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('qk', apiKey);
  localStorage.setItem('qmode', mode);
  closeSettings();
}
document.addEventListener('click', function(e) {
  const panel = document.getElementById('settingsPanel');
  const gear  = document.getElementById('gearBtn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !gear.contains(e.target)) {
    closeSettings();
  }
});
function setMode(m) { mode = m; applyMode(m); }
function applyMode(m) {
  document.getElementById('mManual').classList.toggle('active', m === 'manual');
  document.getElementById('mAuto').classList.toggle('active', m === 'auto');
}

// ── Recording ─────────────────────────────────────────
async function toggleRec() {
  if (recOn) {
    mode === 'manual' ? await stopManual() : stopLive();
  } else {
    await startRec();
  }
}

async function startRec() {
  if (!apiKey) { alert('Введите API ключ в настройках ⚙️'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    allChunks = []; pendChunks = [];
    shownAyahs = []; lastConfirmed = null; predictedBlock = null;
    liveQueue = []; liveRunning = false;

    const m = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
            : MediaRecorder.isTypeSupported('audio/mp4')  ? 'audio/mp4' : '';
    mime = m || 'audio/mp4';
    mediaRec = new MediaRecorder(stream, m ? { mimeType: m } : {});
    mediaRec.ondataavailable = e => {
      if (e.data.size > 0) { allChunks.push(e.data); pendChunks.push(e.data); }
    };
    mediaRec.start(100);
    recOn = true;

    document.getElementById('micBtn').classList.add('on');
    setIdle('Слушаем...', true);

    timerSec = 0;
    timerIv = setInterval(() => {
      timerSec++;
      const mm = String(Math.floor(timerSec/60)).padStart(2,'0');
      const ss = String(timerSec%60).padStart(2,'0');
      document.getElementById('timerEl').textContent = mm+':'+ss;
    }, 1000);

    if (mode === 'auto') {
      startSilenceDetection(stream);
    }
  } catch(e) { alert('Микрофон недоступен: ' + e.message); }
}

async function stopManual() {
  recOn = false;
  clearInterval(timerIv); clearInterval(autoIv);
  document.getElementById('timerEl').textContent = '';
  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.stop(); mediaRec.stream.getTracks().forEach(t => t.stop());
  }
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').classList.add('thinking');
  setIdle('Распознаём...', false);

  await new Promise(r => setTimeout(r, 350));
  const ch = [...allChunks]; allChunks = [];
  await processManual(ch);
  document.getElementById('micBtn').classList.remove('thinking');
  if (!document.getElementById('ayahList').children.length) setIdle('Нажмите микрофон', false);
}

function stopLive() {
  recOn = false;
  clearInterval(timerIv);
  clearInterval(autoIv);
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  document.getElementById('timerEl').textContent = '';
  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.stop(); mediaRec.stream.getTracks().forEach(t => t.stop());
  }
  document.getElementById('micBtn').classList.remove('on');
  if (!document.getElementById('ayahList').children.length) setIdle('Нажмите микрофон', false);
}

// ── Silence detection ─────────────────────────────────
let audioCtx = null;
let silenceTimer = null;
let wasSpeaking = false;
const SILENCE_THRESHOLD = 0.01;  // RMS below this = silence
const SILENCE_DURATION  = 1200;  // ms of silence = end of ayah
const MIN_AYAH_MS       = 1500;  // don't slice if < 1.5s of audio
let sliceStartTime = 0;

function startSilenceDetection(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source   = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  const buf = new Float32Array(analyser.fftSize);
  sliceStartTime = Date.now();

  function getRMS() {
    analyser.getFloatTimeDomainData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
    return Math.sqrt(sum / buf.length);
  }

  autoIv = setInterval(() => {
    if (!recOn) return;
    const rms = getRMS();
    const isSpeaking = rms > SILENCE_THRESHOLD;

    if (isSpeaking) {
      wasSpeaking = true;
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    } else if (wasSpeaking && !silenceTimer) {
      // Silence started — wait SILENCE_DURATION then slice
      silenceTimer = setTimeout(() => {
        silenceTimer = null;
        const elapsed = Date.now() - sliceStartTime;
        if (pendChunks.length > 0 && elapsed >= MIN_AYAH_MS) {
          const b = [...pendChunks]; pendChunks = [];
          sliceStartTime = Date.now();
          wasSpeaking = false;
          liveQueue.push(b);
          if (liveQueue.length > 4) liveQueue.shift();
          runLiveQueue();
        }
      }, SILENCE_DURATION);
    }
  }, 100); // check every 100ms
}

// ── Queue worker for Live mode ─────────────────────────
async function runLiveQueue() {
  if (liveRunning) return; // already running
  liveRunning = true;
  while (liveQueue.length > 0) {
    const batch = liveQueue.shift();
    await processLive(batch);
  }
  liveRunning = false;
}

// ── MANUAL MODE: transcribe everything, return all ayahs ──
async function processManual(chunks) {
  if (!chunks.length) return;
  procOn = true;

  try {    const blob = new Blob(chunks, { type: mime });
    const fd = new FormData();
    fd.append('file', blob, 'a.' + (mime.includes('webm') ? 'webm' : 'mp4'));
    fd.append('model', 'whisper-1');
    fd.append('language', 'ar');
    fd.append('prompt', 'بسم الله الرحمن الرحيم قرآن كريم');

    const wr = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST', headers: { Authorization: 'Bearer ' + apiKey }, body: fd
    });
    if (!wr.ok) { procOn = false; return; }
    const { text } = await wr.json();
    if (!text?.trim()) { procOn = false; return; }

    const ln = getLang();
    const gr = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 3000,
        messages: [{
          role: 'system',
          content: `Quran expert. User recited multiple ayahs. Identify ALL of them in order.
Return COMPLETE full Arabic text for every ayah, even if only partially heard.
Be generous with errors and partial text.
Respond ONLY with JSON array, no markdown:
[{"s":67,"a":1,"name":"Al-Mulk","arabic":"FULL TEXT","tr":"translation in ${ln}"},...]
If nothing: []`
        }, {
          role: 'user', content: 'Transcription: "' + text.trim() + '"'
        }]
      })
    });
    if (!gr.ok) { procOn = false; return; }

    const raw = (await gr.json()).choices[0]?.message?.content || '';
    let arr = [];
    try { arr = JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch {}

    if (Array.isArray(arr) && arr.length > 0) {
      clearAyahs();
      arr.forEach((r, i) => setTimeout(() => addAyahBlock(r, false), i * 150));
    }
  } catch(e) {}
  procOn = false;
}

// ── LIVE MODE: process 4s slices, show confirmed + predict next ──
async function processLive(chunks) {
  if (!chunks.length) return;

  try {
    const blob = new Blob(chunks, { type: mime });
    const fd = new FormData();
    fd.append('file', blob, 'a.' + (mime.includes('webm') ? 'webm' : 'mp4'));
    fd.append('model', 'whisper-1');
    fd.append('language', 'ar');
    fd.append('prompt', 'بسم الله الرحمن الرحيم قرآن كريم');

    const wr = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST', headers: { Authorization: 'Bearer ' + apiKey }, body: fd
    });
    if (!wr.ok) { procOn = false; return; }
    const { text } = await wr.json();
    if (!text?.trim()) { procOn = false; return; }

    const ln = getLang();
    const ctx = lastConfirmed
      ? `Last confirmed ayah: Surah ${lastConfirmed.s} (${lastConfirmed.name}) Ayah ${lastConfirmed.a}.`
      : '';

    // Ask GPT: which ayah(s) are in this 4s slice + what comes NEXT
    const gr = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 1200,
        messages: [{
          role: 'system',
          content: `Quran expert. This is a 4-second audio slice of live Quran recitation.
${ctx}
Tasks:
1. Identify the ayah(s) being recited in this slice (return ALL if multiple)
2. Return the NEXT ayah after the last identified one (for prediction)

Return ONLY JSON, no markdown:
{
  "current": [{"s":67,"a":1,"name":"Al-Mulk","arabic":"FULL AYAH","tr":"in ${ln}"}],
  "next": {"s":67,"a":2,"name":"Al-Mulk","arabic":"FULL AYAH","tr":"in ${ln}"}
}
If nothing recognized: {"current":[],"next":null}`
        }, {
          role: 'user', content: 'Slice transcription: "' + text.trim() + '"'
        }]
      })
    });
    if (!gr.ok) { procOn = false; return; }

    const raw = (await gr.json()).choices[0]?.message?.content || '';
    let res = {};
    try { res = JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch {}

    const current = Array.isArray(res.current) ? res.current : [];
    const next    = res.next || null;

    // Remove predicted block (will re-add or confirm)
    if (predictedBlock) {
      predictedBlock.remove();
      predictedBlock = null;
    }

    // Add newly confirmed ayahs (skip already shown)
    let addedAny = false;
    for (const r of current) {
      const key = r.s + ':' + r.a;
      if (!shownAyahs.find(x => x.s+':'+x.a === key)) {
        shownAyahs.push({ s: r.s, a: r.a });
        lastConfirmed = r;
        addAyahBlock(r, false);
        addedAny = true;
      }
    }

    // Show predicted next ayah (dimmed) if we have one
    if (next) {
      const key = next.s + ':' + next.a;
      if (!shownAyahs.find(x => x.s+':'+x.a === key)) {
        predictedBlock = addAyahBlock(next, true); // dim = true
      }
    }

    if (addedAny || current.length > 0) {
      setIdle('Слушаем...', true);
    }

  } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────
function getLang() {
  const lm = { ru:'Russian', en:'English', tr:'Turkish', uz:'Uzbek', kk:'Kazakh', tj:'Tajik', de:'German', fr:'French' };
  return lm[document.getElementById('langSelect').value] || 'Russian';
}

function clearAyahs() {
  const list = document.getElementById('ayahList');
  list.innerHTML = '';
  list.style.display = 'none';
  document.getElementById('idleWrap').style.display = 'flex';
  shownAyahs = []; lastConfirmed = null; predictedBlock = null;
}

function addAyahBlock(r, dim) {
  const list = document.getElementById('ayahList');
  document.getElementById('idleWrap').style.display = 'none';
  list.style.display = 'flex';

  const block = document.createElement('div');
  block.className = 'ayah-block' + (dim ? ' predicted' : '');
  block.innerHTML = `
    <div class="arabic-line">${r.arabic}</div>
    <div class="trans-line">${r.tr}</div>
    <div class="ref-line">${r.name || ''} · ${r.s}:${r.a}${dim ? ' · следующий' : ''}</div>
  `;
  list.appendChild(block);
  setTimeout(() => block.scrollIntoView({ behavior: 'smooth', block: 'end' }), 150);
  return block;
}

function setIdle(label, live) {
  document.getElementById('idleText').textContent = label;
  document.getElementById('idleDots').classList.toggle('live', live);
}
</script>
