<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quran Live</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0a0a0a;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100%;position:relative;}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;flex-shrink:0;z-index:10;}
.app-title{font-size:.58rem;letter-spacing:.26em;text-transform:uppercase;color:#252525;font-weight:300;}
.gear-btn{width:30px;height:30px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#252525;transition:color .2s;border-radius:50%;}
.gear-btn:hover,.gear-btn.open{color:#777;}
.gear-btn svg{width:15px;height:15px;}

/* ── Settings ── */
.settings-panel{position:fixed;top:46px;right:14px;width:255px;background:#111;border:1px solid #1e1e1e;border-radius:13px;padding:15px;z-index:500;display:none;box-shadow:0 24px 64px rgba(0,0,0,.99);}
.settings-panel.open{display:block;}
.s-label{display:block;font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:#333;margin-bottom:6px;margin-top:13px;}
.s-label:first-child{margin-top:0;}
.settings-panel input,.settings-panel select{width:100%;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:7px;padding:8px 10px;color:#bbb;font-family:‘Inter’,sans-serif;font-size:.82rem;outline:none;}
.settings-panel input:focus,.settings-panel select:focus{border-color:#2e2e2e;}
.settings-panel select option{background:#111;}
.mode-toggle{display:flex;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:7px;overflow:hidden;}
.mode-btn{flex:1;padding:8px 0;border:none;background:transparent;color:#333;font-family:‘Inter’,sans-serif;font-size:.74rem;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:#1a1a1a;color:#bbb;}
.btn-save{width:100%;margin-top:12px;padding:8px;background:#fff;color:#000;border:none;border-radius:7px;font-family:‘Inter’,sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}

/* ── Ruku badge ── */
.ruku-badge{display:none;align-items:center;gap:8px;padding:4px 20px 6px;flex-shrink:0;}
.ruku-badge.on{display:flex;}
.ruku-dot{width:5px;height:5px;border-radius:50%;background:#2a2a2a;animation:pulse 1.4s ease-in-out infinite;}
.ruku-txt{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:#2a2a2a;}

/* ── Shazam-style mic screen ── */
#micScreen{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:0;position:relative;
}
#micScreen.hidden{display:none;}

/* DB loader inside mic screen */
#dbLoader{display:none;position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:200px;}
#dbLoader .db-label{display:flex;justify-content:space-between;margin-bottom:6px;}
#dbLoader .db-label span{font-size:.58rem;letter-spacing:.07em;color:#333;text-transform:uppercase;}
#dbLoader .db-label strong{font-size:.65rem;font-weight:700;color:#555;font-variant-numeric:tabular-nums;}
#dbTrack{height:1.5px;background:#181818;border-radius:2px;overflow:hidden;}
#dbBar{height:100%;width:0%;background:linear-gradient(90deg,#2a2a2a,#555);border-radius:2px;transition:width .25s ease;}

/* Big mic button */
#bigMic{
position:relative;width:120px;height:120px;border-radius:50%;
background:none;border:none;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:transform .2s;
}
#bigMic:active{transform:scale(.95);}

/* Ripple rings */
.mic-ring{
position:absolute;inset:0;border-radius:50%;
border:1.5px solid rgba(255,255,255,.06);
animation:none;
}
#bigMic.listening .mic-ring:nth-child(1){animation:ripple 2.4s ease-out infinite;}
#bigMic.listening .mic-ring:nth-child(2){animation:ripple 2.4s ease-out .6s infinite;}
#bigMic.listening .mic-ring:nth-child(3){animation:ripple 2.4s ease-out 1.2s infinite;}
#bigMic.listening .mic-ring:nth-child(4){animation:ripple 2.4s ease-out 1.8s infinite;}

#bigMic.recognizing .mic-ring:nth-child(1){animation:rippleFast .8s ease-out infinite;}
#bigMic.recognizing .mic-ring:nth-child(2){animation:rippleFast .8s ease-out .2s infinite;}
#bigMic.recognizing .mic-ring:nth-child(3){animation:rippleFast .8s ease-out .4s infinite;}
#bigMic.recognizing .mic-ring:nth-child(4){animation:rippleFast .8s ease-out .6s infinite;}

@keyframes ripple{
0%{transform:scale(1);opacity:.5;}
100%{transform:scale(2.2);opacity:0;}
}
@keyframes rippleFast{
0%{transform:scale(1);opacity:.7;border-color:rgba(255,255,255,.15);}
100%{transform:scale(1.9);opacity:0;}
}

/* Inner circle */
#micCircle{
width:90px;height:90px;border-radius:50%;
background:#111;border:1.5px solid #1e1e1e;
display:flex;align-items:center;justify-content:center;
transition:all .3s;position:relative;z-index:1;
}
#bigMic.listening #micCircle{background:#161616;border-color:#2a2a2a;}
#bigMic.recognizing #micCircle{background:#1a1a1a;border-color:#333;}

#micIcon{width:30px;height:30px;fill:#444;transition:fill .3s;}
#bigMic.listening #micIcon{fill:#888;}
#bigMic.recognizing #micIcon{fill:#aaa;}

#micLabel{
margin-top:28px;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
color:#222;transition:color .3s;
}
#bigMic.listening~#micLabel{color:#333;}
#bigMic.recognizing~#micLabel{color:#444;}

/* ── 3-slot ayah display ── */
#ayahFeed{
flex:1;overflow:hidden;display:none;flex-direction:column;
position:relative;touch-action:pan-y;
}
#ayahFeed.on{display:flex;}
.ayah-slot{display:flex;flex-direction:column;justify-content:center;padding:0 22px;overflow:hidden;}
.ayah-slot.prev{flex:0 0 15%;opacity:.15;border-bottom:1px solid #0f0f0f;}
.ayah-slot.cur{flex:1;overflow-y:auto;overflow-x:hidden;opacity:1;border-bottom:1px solid #0f0f0f;justify-content:flex-start;padding-top:18px;padding-bottom:18px;}
.ayah-slot.cur::-webkit-scrollbar{width:0;}
.ayah-slot.next{flex:0 0 15%;opacity:.15;}
.ayah-slot.prev .ayah-tr,.ayah-slot.next .ayah-tr{font-size:.78rem;line-height:1.4;color:#555;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ayah-slot.prev .ayah-ar,.ayah-slot.prev .ayah-ref,.ayah-slot.next .ayah-ar,.ayah-slot.next .ayah-ref{display:none;}
.ayah-tr{font-size:.78rem;line-height:1.5;color:#555;font-weight:300;}
.ayah-slot.cur .ayah-tr{font-size:clamp(.92rem,2.5vw,1.15rem);line-height:1.72;color:#eee;font-weight:400;}
.ayah-ar{font-family:‘Amiri’,serif;font-size:.85rem;line-height:1.9;direction:rtl;text-align:right;color:#222;}
.ayah-slot.cur .ayah-ar{font-family:‘Amiri’,serif;font-size:clamp(.95rem,2.5vw,1.15rem);line-height:2;direction:rtl;text-align:right;color:#383838;margin-top:10px;}
.ayah-ref{font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:#181818;}
.ayah-slot.cur .ayah-ref{color:#242424;margin-top:6px;}
@keyframes slideUp{from{transform:translateY(22px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes slideDown{from{transform:translateY(-22px);opacity:0;}to{transform:none;opacity:1;}}
#ayahFeed.slide-up .ayah-slot.cur{animation:slideUp .22s ease;}
#ayahFeed.slide-down .ayah-slot.cur{animation:slideDown .22s ease;}

/* ── Pause button (shown during live recognition, bottom center) ── */
#pauseBtn{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
display:none;align-items:center;gap:10px;
background:#0f0f0f;border:1px solid #222;
border-radius:40px;padding:11px 26px;
cursor:pointer;z-index:100;
font-family:‘Inter’,sans-serif;user-select:none;
}
#pauseBtn.show{display:flex;}
#pauseBtn:active{opacity:.6;}
#pauseBtn svg{width:14px;height:14px;fill:#666;flex-shrink:0;}
#pauseBtn .pb-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#444;}

@keyframes pulse{0%,80%,100%{opacity:.4;transform:scale(.85);}40%{opacity:1;transform:scale(1);}}
</style>

</head>

<script>
// ══ Quran Database — lazy load from alquran.cloud, cached in localStorage ══
// Format: [surah, ayah, surahName, arabic, ru, en]
let QB = [];

function qGet(s,a){return QB.find(r=>r[0]===s&&r[1]===a)||null;}
function qNext(s,a){const i=QB.findIndex(r=>r[0]===s&&r[1]===a);return i>=0&&i<QB.length-1?QB[i+1]:null;}
function qPrev(s,a){const i=QB.findIndex(r=>r[0]===s&&r[1]===a);return i>0?QB[i-1]:null;}
function qFmt(r,lang){if(!r)return null;const tr=lang==='en'?r[5]:r[4];return{s:r[0],a:r[1],name:r[2],arabic:r[3],tr};}

// ── DB loading ────────────────────────────────────────────
const DB_KEY_AR='qdb_ar_v1', DB_KEY_RU='qdb_ru_v1', DB_KEY_EN='qdb_en_v1';
let dbReady=false;

function showDbStatus(msg,pct,done=false){
  const lbl=document.getElementById('dbStatusText');
  const bar=document.getElementById('dbBar');
  const pctEl=document.getElementById('dbPct');
  const loader=document.getElementById('dbLoader');
  if(done){loader.style.display='none';return;}
  loader.style.display='block';
  if(lbl) lbl.textContent=msg;
  if(bar) bar.style.width=pct+'%';
  if(pctEl) pctEl.textContent=Math.round(pct)+'%';
}

async function loadQuranDB(){
  try{
    const cached=localStorage.getItem(DB_KEY_AR);
    const cachedRu=localStorage.getItem(DB_KEY_RU);
    const cachedEn=localStorage.getItem(DB_KEY_EN);
    if(cached&&cachedRu&&cachedEn){
      const ar=JSON.parse(cached);
      const ru=JSON.parse(cachedRu);
      const en=JSON.parse(cachedEn);
      QB=ar.map(x=>[x.s,x.a,x.n,x.t,ru[x.s+':'+x.a]||'',en[x.s+':'+x.a]||'']);
      dbReady=true;
      buildNormIndex();
      showDbStatus('',100,true);
      console.log('[db] loaded from cache:',QB.length,'ayahs');
      return;
    }
  }catch(e){localStorage.removeItem(DB_KEY_AR);}

  showDbStatus('Загрузка Корана…',10);
  try{
    const [arRes,ruRes,enRes]=await Promise.all([
      fetch('https://api.alquran.cloud/v1/quran/quran-simple'),
      fetch('https://api.alquran.cloud/v1/quran/ru.kuliev'),
      fetch('https://api.alquran.cloud/v1/quran/en.sahih'),
    ]);
    if(!arRes.ok||!ruRes.ok||!enRes.ok) throw new Error('fetch failed');
    showDbStatus('Обработка…',60);
    const [arData,ruData,enData]=await Promise.all([arRes.json(),ruRes.json(),enRes.json()]);
    const ruMap={},enMap={};
    ruData.data.surahs.forEach(s=>s.ayahs.forEach(a=>ruMap[s.number+':'+a.numberInSurah]=a.text));
    enData.data.surahs.forEach(s=>s.ayahs.forEach(a=>enMap[s.number+':'+a.numberInSurah]=a.text));
    const arStore=[];
    QB=[];
    arData.data.surahs.forEach(s=>{
      s.ayahs.forEach(a=>{
        const key=s.number+':'+a.numberInSurah;
        arStore.push({s:s.number,a:a.numberInSurah,n:s.englishName,t:a.text});
        QB.push([s.number,a.numberInSurah,s.englishName,a.text,ruMap[key]||'',enMap[key]||'']);
      });
    });
    localStorage.setItem(DB_KEY_AR,JSON.stringify(arStore));
    localStorage.setItem(DB_KEY_RU,JSON.stringify(ruMap));
    localStorage.setItem(DB_KEY_EN,JSON.stringify(enMap));
    dbReady=true;
    buildNormIndex();
    showDbStatus('',100,true);
    console.log('[db] downloaded & cached:',QB.length,'ayahs');
  }catch(e){
    console.error('[db] load failed:',e);
    QB=FALLBACK_QB;
    dbReady=true;
    buildNormIndex();
    showDbStatus('Офлайн — мини-база',100,false);
    setTimeout(()=>showDbStatus('',100,true),3000);
  }
}

// Fallback mini-DB
const FALLBACK_QB=[
[1,1,'Al-Fatiha','بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ','Во имя Аллаха, Милостивого, Милосердного','In the name of Allah, the Entirely Merciful'],
[1,2,'Al-Fatiha','ٱلۡحَمۡدُ لِلَّهِ رَبِّ ٱلۡعَٰلَمِينَ','Хвала Аллаху, Господу миров','All praise is due to Allah, Lord of the worlds'],
[1,3,'Al-Fatiha','ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ','Милостивому, Милосердному','The Entirely Merciful, the Especially Merciful'],
[1,4,'Al-Fatiha','مَٰلِكِ يَوۡمِ ٱلدِّينِ','Владыке Дня воздаяния','Sovereign of the Day of Recompense'],
[1,5,'Al-Fatiha','إِيَّاكَ نَعۡبُدُ وَإِيَّاكَ نَسۡتَعِينُ','Тебе одному мы поклоняемся','It is You we worship and You we ask for help'],
[1,6,'Al-Fatiha','ٱهۡدِنَا ٱلصِّرَٰطَ ٱلۡمُسۡتَقِيمَ','Веди нас прямым путём','Guide us to the straight path'],
[1,7,'Al-Fatiha','صِرَٰطَ ٱلَّذِينَ أَنۡعَمۡتَ عَلَيۡهِمۡ','Путём тех, кого Ты облагодетельствовал','The path of those upon whom You have bestowed favor'],
[112,1,'Al-Ikhlas','قُلۡ هُوَ ٱللَّهُ أَحَدٌ','Скажи: Он — Аллах Единый','Say: He is Allah, the One'],
[112,2,'Al-Ikhlas','ٱللَّهُ ٱلصَّمَدُ','Аллах Самодостаточный','Allah, the Eternal, Absolute'],
[112,3,'Al-Ikhlas','لَمۡ يَلِدۡ وَلَمۡ يُولَدۡ','Он не родил и не был рождён','He neither begets nor is born'],
[112,4,'Al-Ikhlas','وَلَمۡ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ','и нет никого равного Ему','Nor is there to Him any equivalent'],
[114,1,'An-Nas','قُلۡ أَعُوذُ بِرَبِّ ٱلنَّاسِ','Прибегаю к защите Господа людей','Say: I seek refuge in the Lord of mankind'],
[114,2,'An-Nas','مَلِكِ ٱلنَّاسِ','Царя людей','The Sovereign of mankind'],
[114,3,'An-Nas','إِلَٰهِ ٱلنَّاسِ','Бога людей','The God of mankind'],
];

// ══ Config ══════════════════════════════════════════════
let apiKey=localStorage.getItem('apiKey')||'';
let lang=localStorage.getItem('lang')||'ru';
let mode=localStorage.getItem('mode')||'auto';

document.getElementById('apiKey').value=apiKey;
document.getElementById('lang').value=lang;

function getLang(){return document.getElementById('lang').value||lang;}

function setMode(m){
  mode=m;
  document.getElementById('mM').classList.toggle('active',m==='manual');
  document.getElementById('mA').classList.toggle('active',m==='auto');
}
setMode(mode);
loadQuranDB();

function saveS(){
  apiKey=document.getElementById('apiKey').value.trim();
  lang=document.getElementById('lang').value;
  mode=document.getElementById('mode')||mode;
  localStorage.setItem('apiKey',apiKey);
  localStorage.setItem('lang',lang);
  localStorage.setItem('mode',mode);
  toggleSettings();
}

function toggleSettings(){
  document.getElementById('sp').classList.toggle('open');
  document.getElementById('gearBtn').classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.settings-panel')&&!e.target.closest('.gear-btn')){
    document.getElementById('sp').classList.remove('open');
    document.getElementById('gearBtn').classList.remove('open');
  }
});

// ══ State ══════════════════════════════════════════════
let recOn=false;
let mediaRec=null, mime='';
let allChunks=[],pendChunks=[],rollingBuf=[];
let timerIv=null, advTmr=null;
let win=[null,null,null]; // [prev, cur, next]
let ayahHistory=[]; // full history of shown ayahs
let firstRecognized=false;

// ══ UI helpers ══════════════════════════════════════════
function showMicScreen(show){
  document.getElementById('micScreen').classList.toggle('hidden',!show);
  document.getElementById('ayahFeed').classList.toggle('on',!show);
  // Always hide pause button when on mic screen
  if(show) document.getElementById('pauseBtn').classList.remove('show');
}

// ── Pause / resume ──
function onPauseBtn(){
  if(advTmr){clearTimeout(advTmr);advTmr=null;}
  if(pollIv){clearInterval(pollIv);pollIv=null;}
  liveState='idle';
  anchored=false;
  recOn=false;
  win=[null,null,null];
  ayahHistory=[];
  firstRecognized=false;
  rollingBuf=[];
  if(mediaRec&&mediaRec.state!=='inactive'){
    mediaRec.stop();
    mediaRec.stream.getTracks().forEach(t=>t.stop());
  }
  document.getElementById('pauseBtn').classList.remove('show');
  showRukuOverlay(false);
  showMicScreen(true);
  setMicState('idle');

async function startRec(){
  apiKey=document.getElementById('apiKey').value.trim();
  if(!apiKey){alert('Введите OpenAI API Key в настройках');return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){alert('Нет доступа к микрофону');return;}

  // Preserve position if resuming (anchored + win set)
  const resuming=anchored&&win[1]!=null;
  if(!resuming){
    allChunks=[];pendChunks=[];rollingBuf=[];win=[null,null,null];
    anchored=false;
  } else {
    allChunks=[];pendChunks=[];rollingBuf=[];
    // keep win, anchored
  }
  liveState='idle';
  if(pollIv){clearInterval(pollIv);pollIv=null;}
  if(advTmr){clearTimeout(advTmr);advTmr=null;}

  const types=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus',''];
  mime=types.find(t=>!t||MediaRecorder.isTypeSupported(t))||'';
  const opts=mime?{mimeType:mime}:{};
  mediaRec=new MediaRecorder(stream,opts);
  mediaRec.ondataavailable=e=>{
    if(e.data.size>0){
      allChunks.push(e.data);
      pendChunks.push(e.data);
      rollingBuf.push(e.data);
      if(rollingBuf.length>100)rollingBuf.shift(); // ~10s buffer
    }
  };
  mediaRec.start(100);
  recOn=true;

  if(resuming){
    // Already have recognized ayahs — go straight to feed view
    showMicScreen(false);
  }
  setMicState('listening');
  showEditHint(false);
  if(mode==='auto') startLive();
}

function stopManual(){
  if(mediaRec?.state!=='inactive'){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}
  recOn=false;
  setMicState('idle');
}

function stopLive(){
  recOn=false;
  if(pollIv){clearInterval(pollIv);pollIv=null;}
  if(advTmr){clearTimeout(advTmr);advTmr=null;}
  liveState='idle';rollingBuf=[];
  document.getElementById('rukuBadge').classList.remove('on');
  if(mediaRec?.state!=='inactive'){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}
  setMicState('idle');
}

// ══ Live mode v5.0 ══════════════════════════════════════
//
// НОВЫЙ АЛГОРИТМ — без GPT в основном цикле:
//
// 1. Whisper (с language:'ar') → арабский текст
// 2. Локальный fuzzy-поиск по QB за <50мс → аят
// 3. GPT только как fallback если fuzzy < 40% совпадение
//
// Это убирает 2-5с задержки GPT на каждый цикл.
// Poll каждые 3с (вместо 5с) — быстрее реакция.
// Буфер увеличен до 10с (100 чанков) — лучше качество Whisper.

const CHARS_PER_SEC_LIVE = 7.0;
const LAG_SEC = 0;

function ayahMs(row){
  if(!row)return 3000;
  const chars=row[3].replace(/\s/g,'').length;
  return Math.max(1500,Math.min(18000,(chars/CHARS_PER_SEC_LIVE)*1000));
}

function qAdvanceN(s,a,n){
  let row=qGet(s,a);
  if(!row)return null;
  for(let i=0;i<n;i++){const nxt=qNext(row[0],row[1]);if(!nxt)break;row=nxt;}
  return row;
}

function qAdvanceSec(s,a,lagSec){
  if(lagSec<=0)return qGet(s,a);
  let row=qGet(s,a);
  if(!row)return row;
  let elapsed=0;
  while(elapsed<lagSec){
    elapsed+=ayahMs(row)/1000;
    const nxt=qNext(row[0],row[1]);
    if(!nxt)break;
    row=nxt;
  }
  return row;
}

function qIdx(s,a){return QB.findIndex(r=>r[0]===s&&r[1]===a);}

// ── Нормализация арабского текста ──────────────────────
// Убираем огласовки, хамзы, удвоения — оставляем скелет согласных
function arNorm(s){
  if(!s)return '';
  return s
    .replace(/[\u064B-\u065F\u0670]/g,'')   // огласовки
    .replace(/[\u0622\u0623\u0625\u0627]/g,'\u0627') // все алифы → ا
    .replace(/\u0629/g,'\u0647')             // та-марбута → ха
    .replace(/\u0649/g,'\u064A')             // алиф-максура → йа
    .replace(/\u0648\u0648/g,'\u0648')       // двойной вав
    .replace(/\s+/g,'')
    .trim();
}

// Предвычисляем нормализованные аяты при загрузке БД
let QB_NORM = []; // parallel array of normalized arabic strings

function buildNormIndex(){
  QB_NORM = QB.map(r => arNorm(r[3]));
  console.log('[fuzzy] norm index built:', QB_NORM.length, 'ayahs');
}

// ── Fuzzy matching ─────────────────────────────────────
// Считаем долю совпадающих триграмм (быстро, устойчиво к ошибкам Whisper)
function trigrams(s){
  const set=new Set();
  for(let i=0;i<=s.length-3;i++) set.add(s.slice(i,i+3));
  return set;
}

function trigramScore(a,b){
  if(!a||!b)return 0;
  const ta=trigrams(a), tb=trigrams(b);
  if(!ta.size||!tb.size)return 0;
  let common=0;
  ta.forEach(t=>{if(tb.has(t))common++;});
  return common/Math.max(ta.size,tb.size);
}

// Ищем лучший аят в QB по нормализованному тексту из Whisper
// Если есть текущий win[1], ищем сначала в окне ±20 аятов (быстро),
// потом при необходимости по всей БД
function fuzzyFind(rawAr, curS, curA){
  const q = arNorm(rawAr);
  if(q.length < 8) return null; // слишком мало текста

  let bestScore = 0;
  let bestIdx = -1;

  // Определяем диапазон поиска
  const curIdx = (curS&&curA) ? qIdx(curS,curA) : -1;
  let searchStart = 0, searchEnd = QB.length-1;

  if(curIdx >= 0){
    // Сначала ищем в окне ±25 аятов вокруг текущего
    searchStart = Math.max(0, curIdx - 5);  // не назад больше 5
    searchEnd = Math.min(QB.length-1, curIdx + 25);
  }

  for(let i=searchStart; i<=searchEnd; i++){
    const score = trigramScore(q, QB_NORM[i]);
    if(score > bestScore){
      bestScore = score;
      bestIdx = i;
    }
  }

  // Если в окне нашли слабо — ищем по всей БД
  if(bestScore < 0.35 && curIdx >= 0){
    for(let i=0; i<QB.length; i++){
      if(i>=searchStart && i<=searchEnd) continue;
      const score = trigramScore(q, QB_NORM[i]);
      if(score > bestScore){
        bestScore = score;
        bestIdx = i;
      }
    }
  }

  console.log('[fuzzy] best score:', bestScore.toFixed(2),
    bestIdx>=0 ? QB[bestIdx][0]+':'+QB[bestIdx][1] : 'none',
    '| query:', q.slice(0,30));

  if(bestScore < 0.28) return null; // ниже порога — не уверены
  return {row: QB[bestIdx], score: bestScore};
}

let liveState='idle';
let pollIv=null, pollRunning=false;
let rukuAt=0;
let anchored=false;

function stopRukuDetector(){}
function startRukuDetector(){}
let anchorDone=false,anchorRunning=false,anchorTimer=null;
function retryAnchor(){}

function startLive(){
  liveState='idle';
  pollRunning=false;
  anchored=false;
  if(pollIv){clearInterval(pollIv);pollIv=null;}
  // Строим индекс если ещё нет
  if(QB_NORM.length === 0 && QB.length > 0) buildNormIndex();
  pollIv=setInterval(doPoll, 3000); // каждые 3с вместо 5с
}

// ── Poll: Whisper → fuzzy → (опционально GPT fallback) ──
async function doPoll(){
  if(!recOn||pollRunning)return;
  const chunks=[...rollingBuf];
  if(!chunks.length)return;
  pollRunning=true;
  const lg=getLang();
  setMicState('recognizing');

  try{
    const blob=new Blob(chunks,{type:mime});
    const fd=new FormData();
    fd.append('file',blob,'p.'+(mime.includes('webm')?'webm':'mp4'));
    fd.append('model','whisper-1');
    fd.append('language','ar');  // ← ВАЖНО: фиксируем арабский
    fd.append('prompt','بسم الله الرحمن الرحيم الحمد لله رب العالمين الله أكبر');
    const wr=await fetch('https://api.openai.com/v1/audio/transcriptions',
      {method:'POST',headers:{Authorization:'Bearer '+apiKey},body:fd});
    if(!wr.ok){pollRunning=false;setMicState('listening');return;}
    const{text}=await wr.json();
    if(!text?.trim()){pollRunning=false;setMicState('listening');return;}

    const raw=text.trim();
    console.log('[poll]',liveState,'→',raw.slice(0,80));

    // ── 1. Аллаху Акбар — локальный детект (приоритет) ──
    const norm=arNorm(raw);
    const hasAkbar =
      norm.includes('\u0627\u0644\u0644\u0647\u0627\u0643\u0628\u0631') || // اللهاكبر
      /\u0627\u0644\u0644\u0647\s*\u0623\u0643\u0628\u0631/.test(raw) ||
      /allahu\s*akbar/i.test(raw);

    if(hasAkbar){
      console.log('[poll] ★ AKBAR');
      handleAction({action:'ruku'},lg);
      pollRunning=false;setMicState('listening');return;
    }

    // ── 2. Фатиха — локальный детект (только после руку) ──
    const msSinceRuku=rukuAt>0?Date.now()-rukuAt:99999;
    if(liveState==='paused'&&msSinceRuku>3000){
      const hasFatiha=
        norm.includes('\u0627\u0644\u062d\u0645\u062f\u0644\u0644\u0647') ||
        norm.includes('\u0631\u0628\u0627\u0644\u0639\u0627\u0644\u0645\u064a\u0646') ||
        norm.includes('\u0645\u0644\u0643\u064a\u0648\u0645\u0627\u0644\u062f\u064a\u0646') ||
        norm.includes('\u0627\u064a\u0627\u0643\u0646\u0639\u0628\u062f') ||
        norm.includes('\u0627\u0644\u0635\u0631\u0627\u0637\u0627\u0644\u0645\u0633\u062a\u0642\u064a\u0645') ||
        /alhamdu/i.test(raw);
      if(hasFatiha){
        console.log('[poll] ★ FATIHA');
        handleAction({action:'fatiha'},lg);
        pollRunning=false;setMicState('listening');return;
      }
    }

    // Не обновляем позицию если на паузе
    if(liveState==='paused'){pollRunning=false;setMicState('listening');return;}

    // ── 3. Fuzzy поиск по QB (быстро, без API) ──
    const curS=win[1]?.s, curA=win[1]?.a;
    const fuzzy=fuzzyFind(raw, curS, curA);

    if(fuzzy && fuzzy.score >= 0.28){
      // Уверены — используем напрямую
      console.log('[poll] fuzzy hit score='+fuzzy.score.toFixed(2));
      handleAction({action:'recite',s:fuzzy.row[0],a:fuzzy.row[1]},lg);
      pollRunning=false;setMicState('listening');return;
    }

    // ── 4. GPT fallback (только если fuzzy не нашёл ничего) ──
    console.log('[poll] fuzzy miss → GPT fallback');
    const curCtx=win[1]
      ?`Currently showing: Surah ${win[1].s} Ayah ${win[1].a}.`
      :'First recognition.';
    const gr=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body:JSON.stringify({model:'gpt-4o',max_tokens:40,messages:[{
        role:'system',
        content:`Quran expert. ${curCtx} Whisper transcribed this Arabic from live recitation. Find the Quran ayah. Return ONLY JSON:
{"action":"recite","s":2,"a":255} or {"action":"silence"} if truly unrecognizable.`
      },{role:'user',content:`"${raw}"`}]})
    });
    if(!gr.ok){pollRunning=false;setMicState('listening');return;}
    const graw=(await gr.json()).choices[0]?.message?.content||'';
    let res={};
    try{res=JSON.parse(graw.replace(/```json|```/g,'').trim());}catch{
      pollRunning=false;setMicState('listening');return;
    }
    console.log('[poll] GPT →',JSON.stringify(res));
    handleAction(res,lg);

  }catch(e){console.warn('[poll]',e);}
  pollRunning=false;
  setMicState(recOn?'listening':'idle');
}



function handleAction(res,lg){
  switch(res.action){

    case 'recite':{
      if(!res.s||!res.a)break;
      const detectedRow=qGet(res.s,res.a);
      if(!detectedRow)break;

      if(!anchored){
        // Первый якорь — показываем ровно тот аят что распознан
        const compensated=qAdvanceSec(res.s,res.a,LAG_SEC)||detectedRow;
        console.log('[anchor]',res.s+':'+res.a,'→',compensated[0]+':'+compensated[1]);
        anchored=true;
        _anchorTo(compensated,lg);
      } else {
        if(!win[1])break;
        const curIdx=qIdx(win[1].s,win[1].a);
        const detIdx=qIdx(res.s,res.a);
        const diff=detIdx-curIdx; // без смещения

        if(diff>5){
          const compensated=qAdvanceSec(res.s,res.a,LAG_SEC)||detectedRow;
          console.log('[poll] hard correction +'+diff);
          _anchorTo(compensated,lg);
        } else if(diff>1){
          console.log('[poll] soft speed-up +'+diff);
          if(advTmr){clearTimeout(advTmr);advTmr=null;}
          scheduleAdvance(300,lg);
        } else if(diff<-4){
          console.log('[poll] ignore behind '+(-diff));
        }
      }
      break;
    }

    case 'ruku':{
      if(liveState!=='paused'){
        liveState='paused';
        anchored=false; // после руку ждём нового якоря на Фатихе
        rukuAt=Date.now();
        rollingBuf=[];
        if(advTmr){clearTimeout(advTmr);advTmr=null;}
        showRukuOverlay(true,'руку / саджда');
      }
      break;
    }

    case 'fatiha':{
      if(win[1]&&win[1].s===1&&win[1].a<=3)break;
      liveState='running';
      anchored=true;
      if(advTmr){clearTimeout(advTmr);advTmr=null;}
      showRukuOverlay(false);
      const f1=qGet(1,1),f2=qGet(1,2);
      win=[null,f1?qFmt(f1,lg):null,f2?qFmt(f2,lg):null];
      renderFeed();
      if(f1)scheduleAdvance(ayahMs(f1),lg);
      break;
    }

    case 'silence':
    default:
      break;
  }
}

function _anchorTo(row,lg){
  if(advTmr){clearTimeout(advTmr);advTmr=null;}
  showRukuOverlay(false);
  liveState='running';
  const prvRow=qPrev(row[0],row[1]);
  const nxtRow=qNext(row[0],row[1]);
  win=[prvRow?qFmt(prvRow,lg):null,qFmt(row,lg),nxtRow?qFmt(nxtRow,lg):null];
  renderFeed();
  scheduleAdvance(Math.round(ayahMs(row)*0.5),lg);
}
function showRukuOverlay(show,label='руку — пауза'){
  const badge=document.getElementById('rukuBadge');
  const txt=document.getElementById('rukuTxt');
  if(show){badge.classList.add('on');txt.textContent=label;}
  else{badge.classList.remove('on');}
}

function showEditHint(show){}

function scheduleAdvance(delayMs,lg){
  if(advTmr){clearTimeout(advTmr);advTmr=null;}
  if(!recOn||liveState==='paused')return;
  advTmr=setTimeout(()=>doAdvance(lg),delayMs);
}

function doAdvance(lg){
  advTmr=null;
  if(!recOn||liveState==='paused'||!win[2])return;
  const newPrev=win[1];
  const newCur=win[2];
  const newCurRow=newCur?qGet(newCur.s,newCur.a):null;
  const newNxtRow=newCurRow?qNext(newCurRow[0],newCurRow[1]):null;
  win=[newPrev,newCur,newNxtRow?qFmt(newNxtRow,lg):null];
  renderFeed();
  if(newCurRow)scheduleAdvance(ayahMs(newCurRow),lg);
}

// ══ Render: 3 аята — prev / cur / next ══════════════════

function slotHTML(ayah){
  if(!ayah)return '<div class="ayah-tr" style="opacity:.04">—</div>';
  return `<div class="ayah-tr">${ayah.tr||'—'}</div>
<div class="ayah-ar">${ayah.arabic||''}</div>
<div class="ayah-ref">${ayah.name} · ${ayah.s}:${ayah.a}</div>`;
}

function renderFeed(dir){
  if(!win[1])return;

  if(!firstRecognized){
    firstRecognized=true;
    showMicScreen(false);
    initFeedScroll();
  }
  const pb=document.getElementById('pauseBtn');
  if(recOn)pb.classList.add('show');

  const feed=document.getElementById('ayahFeed');
  feed.innerHTML=`
    <div class="ayah-slot prev">${slotHTML(win[0])}</div>
    <div class="ayah-slot cur">${slotHTML(win[1])}</div>
    <div class="ayah-slot next">${slotHTML(win[2])}</div>`;

  if(dir){
    feed.classList.remove('slide-up','slide-down');
    void feed.offsetWidth;
    feed.classList.add(dir==='next'?'slide-up':'slide-down');
  }
}

// ── Swipe / scroll navigation ─────────────────────────
let _navLock=false, _touchY0=0;

function manualNav(dir){
  if(_navLock)return;
  _navLock=true;
  setTimeout(()=>_navLock=false,380);
  const lg=getLang();
  if(dir==='next'&&win[2]){
    const row=qGet(win[2].s,win[2].a);
    if(!row)return;
    const nxt=qNext(row[0],row[1]);
    win=[win[1],win[2],nxt?qFmt(nxt,lg):null];
    anchored=true;
    if(advTmr){clearTimeout(advTmr);advTmr=null;}
    if(recOn){liveState='running';scheduleAdvance(ayahMs(row),lg);}
    renderFeed('next');
  } else if(dir==='prev'&&win[0]){
    const row=qGet(win[0].s,win[0].a);
    if(!row)return;
    const prv=qPrev(row[0],row[1]);
    win=[prv?qFmt(prv,lg):null,win[0],win[1]];
    anchored=true;
    if(advTmr){clearTimeout(advTmr);advTmr=null;}
    if(recOn){liveState='running';scheduleAdvance(ayahMs(row),lg);}
    renderFeed('prev');
  }
}

function initFeedScroll(){
  const feed=document.getElementById('ayahFeed');
  feed.addEventListener('touchstart',e=>{_touchY0=e.touches[0].clientY;},{passive:true});
  feed.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-_touchY0;
    if(Math.abs(dy)>38)manualNav(dy<0?'next':'prev');
  },{passive:true});
  feed.addEventListener('wheel',e=>{
    e.preventDefault();
    manualNav(e.deltaY>0?'next':'prev');
  },{passive:false});
}

function renderWin(){renderFeed();}
