<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quran Live</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0d0d0d;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;}

.app{display:grid;grid-template-columns:1fr 76px;height:100%;}
@media(orientation:portrait){
.app{grid-template-columns:1fr;grid-template-rows:1fr 72px;}
.sidebar{flex-direction:row;justify-content:center;border-left:none;border-top:1px solid #161616;padding:0 0 6px;}
.content{padding:0 22px;}
.settings-panel{right:14px!important;top:48px!important;}
}

.content{padding:0 28px;display:flex;flex-direction:column;overflow:hidden;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;flex-shrink:0;position:relative;z-index:10;}
.app-title{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:#2a2a2a;font-weight:300;}

.gear-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2a2a2a;transition:color .2s;border-radius:50%;}
.gear-btn:hover,.gear-btn.open{color:#888;}
.gear-btn svg{width:14px;height:14px;}

.settings-panel{position:fixed;top:46px;right:84px;width:255px;background:#131313;border:1px solid #1f1f1f;border-radius:13px;padding:15px;z-index:500;display:none;box-shadow:0 24px 64px rgba(0,0,0,.99);}
.settings-panel.open{display:block;}
.s-label{display:block;font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:#3a3a3a;margin-bottom:6px;margin-top:13px;}
.s-label:first-child{margin-top:0;}
.settings-panel input,.settings-panel select{width:100%;background:#0d0d0d;border:1px solid #1f1f1f;border-radius:7px;padding:8px 10px;color:#bbb;font-family:‘Inter’,sans-serif;font-size:.82rem;outline:none;}
.settings-panel input:focus,.settings-panel select:focus{border-color:#2e2e2e;}
.settings-panel select option{background:#131313;}
.mode-toggle{display:flex;background:#0d0d0d;border:1px solid #1f1f1f;border-radius:7px;overflow:hidden;}
.mode-btn{flex:1;padding:8px 0;border:none;background:transparent;color:#3a3a3a;font-family:‘Inter’,sans-serif;font-size:.74rem;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:#1a1a1a;color:#bbb;}
.btn-save{width:100%;margin-top:12px;padding:8px;background:#fff;color:#000;border:none;border-radius:7px;font-family:‘Inter’,sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}

/* pace */
.pace-bar{display:none;align-items:center;gap:7px;padding:4px 0 8px;flex-shrink:0;}
.pace-bar.on{display:flex;}
.pace-dot{width:4px;height:4px;border-radius:50%;background:#1e1e1e;transition:background .3s;}
.pace-dot.on{background:#555;}
.pace-lbl{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#2a2a2a;}
.pace-lbl.ok{color:#444;}

/* 3-slot stage */
.stage{flex:1;display:none;flex-direction:column;overflow:hidden;}
.stage.on{display:flex;}

.slot{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0;transition:opacity .45s ease;}
.slot.prev{opacity:.18;}
.slot.cur{opacity:1;border-top:1px solid #181818;border-bottom:1px solid #181818;}
.slot.nxt{opacity:.18;}

.ar{font-family:‘Amiri’,serif;font-size:clamp(1rem,3.6vw,1.85rem);line-height:1.95;direction:rtl;text-align:right;color:#f0f0f0;}
.tr{margin-top:5px;font-size:clamp(.76rem,1.7vw,.92rem);line-height:1.6;color:#999;font-weight:300;}
.rf{margin-top:5px;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:#242424;}

/* idle */
.idle{flex:1;display:flex;flex-direction:column;justify-content:center;gap:9px;}
.dots{display:flex;gap:5px;}
.dots span{width:3px;height:3px;border-radius:50%;background:#1e1e1e;animation:dp 1.4s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.dots.on span{background:#777;}
.idle-lbl{font-size:.62rem;letter-spacing:.17em;text-transform:uppercase;color:#222;}

/* sidebar */
.sidebar{border-left:1px solid #131313;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:14px 0;flex-shrink:0;}
.mic{width:52px;height:52px;border-radius:50%;border:1.5px solid #1a1a1a;background:#0f0f0f;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;position:relative;}
.mic svg{width:19px;height:19px;fill:#888;transition:fill .2s;}
.mic:hover{border-color:#333;}
.mic.on{background:#eee;border-color:#eee;}
.mic.on svg{fill:#000;}
.mic.on::after{content:’’;position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(255,255,255,.07);animation:ring 2s ease-out infinite;}
@keyframes ring{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.6);opacity:0;}}
.mic.busy svg{fill:#222;}
.tmr{font-size:.58rem;color:#222;letter-spacing:.07em;font-variant-numeric:tabular-nums;}
</style>

</head>

const QB=[
[1,1,"Al-Fatiha","بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ","Во имя Аллаха, Милостивого, Милосердного","In the name of Allah, the Entirely Merciful, the Especially Merciful"],
[1,2,"Al-Fatiha","الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ","Хвала Аллаху, Господу миров","All praise is due to Allah, Lord of the worlds"],
[1,3,"Al-Fatiha","الرَّحْمَٰنِ الرَّحِيمِ","Милостивому, Милосердному","The Entirely Merciful, the Especially Merciful"],
[1,4,"Al-Fatiha","مَالِكِ يَوْمِ الدِّينِ","Владыке Дня воздаяния","Sovereign of the Day of Recompense"],
[1,5,"Al-Fatiha","إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ","Тебе одному мы поклоняемся и Тебя одного молим о помощи","It is You we worship and You we ask for help"],
[1,6,"Al-Fatiha","اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ","Веди нас прямым путём","Guide us to the straight path"],
[1,7,"Al-Fatiha","صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ","Путём тех, кого Ты облагодетельствовал, не тех, на кого пал гнев, и не заблудших","The path of those upon whom You have bestowed favor, not of those who have earned Your anger or of those who are astray"],

[78,14,"An-Naba","وَأَنزَلْنَا مِنَ الْمُعْصِرَاتِ مَاءً ثَجَّاجًا","и низвели из туч обильную воду,","And sent down from the rain clouds pouring water"],

[78,21,"An-Naba","إِنَّ جَهَنَّمَ كَانَتْ مِرْصَادًا","Воистину, Геенна является засадой","Indeed, Hell has been lying in wait"],
[78,22,"An-Naba","لِّلطَّاغِينَ مَآبًا","для беззаконников — обиталищем,","For the transgressors, a place of return"],

function qGet(s,a){return QB.find(r=>r[0]===s&&r[1]===a)||null;}
function qNext(s,a){const i=QB.findIndex(r=>r[0]===s&&r[1]===a);return i>=0&&i<QB.length-1?QB[i+1]:null;}
function qPrev(s,a){const i=QB.findIndex(r=>r[0]===s&&r[1]===a);return i>0?QB[i-1]:null;}
function qFmt(r,lang){if(!r)return null;const tr=lang==="en"?r[5]:r[4];return{s:r[0],a:r[1],name:r[2],arabic:r[3],tr};}
// ══ Config ════════════════════════════════════
let apiKey = localStorage.getItem('qk')||'';
let mode   = localStorage.getItem('qm')||'manual';
document.getElementById('apiKey').value = apiKey;
applyMode(mode);

// ══ Settings ══════════════════════════════════
function toggleSettings(){
  const p=document.getElementById('sp');
  const o=p.classList.toggle('open');
  document.getElementById('gearBtn').classList.toggle('open',o);
}
function closeSettings(){
  document.getElementById('sp').classList.remove('open');
  document.getElementById('gearBtn').classList.remove('open');
}
function saveS(){
  apiKey=document.getElementById('apiKey').value.trim();
  localStorage.setItem('qk',apiKey);
  localStorage.setItem('qm',mode);
  closeSettings();
}
document.addEventListener('click',e=>{
  const p=document.getElementById('sp'),g=document.getElementById('gearBtn');
  if(p.classList.contains('open')&&!p.contains(e.target)&&!g.contains(e.target))closeSettings();
});
function setMode(m){mode=m;applyMode(m);}
function applyMode(m){
  document.getElementById('mM').classList.toggle('active',m==='manual');
  document.getElementById('mA').classList.toggle('active',m==='auto');
}
function getLang(){return document.getElementById('lang').value||'ru';}

// ══ Recording state ════════════════════════════
let mediaRec=null,audioCtx=null;
let allChunks=[],pendChunks=[];
let recOn=false;
let timerSec=0,timerIv=null,autoIv=null;
let silTmr=null,wasSpeaking=false;
let sliceStart=0;
let mime='audio/mp4';

// ══ Pace ═══════════════════════════════════════
let samples=[];      // [{chars,ms}]
let cpm=null;        // chars per ms, null = not calibrated
let advTmr=null;     // pace-advance timer

// ══ Window ═════════════════════════════════════
// Each entry: {s,a} or null
let win=[null,null,null]; // [prev, cur, nxt]

// ══ Toggle rec ═════════════════════════════════
async function toggleRec(){
  recOn?(mode==='manual'?stopManual():stopLive()):startRec();
}

async function startRec(){
  if(!apiKey){alert('Введите API ключ в настройках ⚙️');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true}});
    allChunks=[];pendChunks=[];win=[null,null,null];
    samples=[];cpm=null;if(advTmr){clearTimeout(advTmr);advTmr=null;}

    const m=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
    mime=m||'audio/mp4';
    mediaRec=new MediaRecorder(stream,m?{mimeType:m}:{});
    mediaRec.ondataavailable=e=>{if(e.data.size>0){allChunks.push(e.data);pendChunks.push(e.data);}};
    mediaRec.start(100);
    recOn=true;sliceStart=Date.now();

    document.getElementById('mic').classList.add('on');
    setIdle('Слушаем...',true);
    if(mode==='auto')document.getElementById('paceBar').classList.add('on');

    timerSec=0;
    timerIv=setInterval(()=>{
      timerSec++;
      document.getElementById('tmr').textContent=
        String(Math.floor(timerSec/60)).padStart(2,'0')+':'+String(timerSec%60).padStart(2,'0');
    },1000);

    if(mode==='auto')startSilence(stream);
  }catch(e){alert('Микрофон: '+e.message);}
}

async function stopManual(){
  recOn=false;clearInterval(timerIv);
  document.getElementById('tmr').textContent='';
  if(mediaRec?.state!=='inactive'){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}
  document.getElementById('mic').classList.remove('on');
  document.getElementById('mic').classList.add('busy');
  setIdle('Распознаём...',false);
  await new Promise(r=>setTimeout(r,300));
  const ch=[...allChunks];allChunks=[];
  await doManual(ch);
  document.getElementById('mic').classList.remove('busy');
}

function stopLive(){
  recOn=false;clearInterval(timerIv);clearInterval(autoIv);
  if(silTmr){clearTimeout(silTmr);silTmr=null;}
  if(advTmr){clearTimeout(advTmr);advTmr=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  document.getElementById('tmr').textContent='';
  if(mediaRec?.state!=='inactive'){mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());}
  document.getElementById('mic').classList.remove('on');
  document.getElementById('paceBar').classList.remove('on');
}

// ══ Silence detection ══════════════════════════
const THR=0.012, SIL=1100, MINSL=1200;

function startSilence(stream){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const src=audioCtx.createMediaStreamSource(stream);
  const ana=audioCtx.createAnalyser();ana.fftSize=512;src.connect(ana);
  const buf=new Float32Array(ana.fftSize);
  function rms(){ana.getFloatTimeDomainData(buf);let s=0;for(let i=0;i<buf.length;i++)s+=buf[i]*buf[i];return Math.sqrt(s/buf.length);}

  autoIv=setInterval(()=>{
    if(!recOn)return;
    const spk=rms()>THR;
    if(spk){wasSpeaking=true;if(silTmr){clearTimeout(silTmr);silTmr=null;}}
    else if(wasSpeaking&&!silTmr){
      silTmr=setTimeout(()=>{
        silTmr=null;
        const dur=Date.now()-sliceStart;
        if(pendChunks.length>0&&dur>=MINSL){
          const b=[...pendChunks];pendChunks=[];
          const d=dur;sliceStart=Date.now();wasSpeaking=false;
          doLive(b,d); // fire and forget — no queue needed, silence = natural gap
        }
      },SIL);
    }
  },80);
}

// ══ MANUAL MODE ═══════════════════════════════
async function doManual(chunks){
  if(!chunks.length)return;
  try{
    const blob=new Blob(chunks,{type:mime});
    const fd=new FormData();
    fd.append('file',blob,'a.'+(mime.includes('webm')?'webm':'mp4'));
    fd.append('model','whisper-1');fd.append('language','ar');
    fd.append('prompt','بسم الله الرحمن الرحيم قرآن كريم');
    const wr=await fetch('https://api.openai.com/v1/audio/transcriptions',{method:'POST',headers:{Authorization:'Bearer '+apiKey},body:fd});
    if(!wr.ok)return;
    const{text}=await wr.json();if(!text?.trim())return;

    const lg=getLang();
    const gr=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body:JSON.stringify({model:'gpt-4o',max_tokens:1000,messages:[{
        role:'system',
        content:`Quran expert. Identify ALL ayahs recited in order. For each return surah number, ayah number only.
JSON array only: [{"s":78,"a":1},{"s":78,"a":2},...] — empty array if nothing.`
      },{role:'user',content:'"'+text.trim()+'"'}]})
    });
    if(!gr.ok)return;
    const raw=(await gr.json()).choices[0]?.message?.content||'';
    let arr=[];try{arr=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{}
    if(!Array.isArray(arr)||!arr.length)return;

    // Render as scrollable list
    showList(arr.map(x=>{const r=qGet(x.s,x.a);return qFmt(r,lg)||{s:x.s,a:x.a,name:'',arabic:'',tr:''}}));
  }catch(e){}
  document.getElementById('mic').classList.remove('busy');
}

function showList(ayahs){
  document.getElementById('idle').style.display='none';
  document.getElementById('stage').classList.remove('on');
  let list=document.getElementById('mlist');
  if(!list){list=document.createElement('div');list.id='mlist';list.style.cssText='flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:24px;padding:8px 0 20px;';
    document.getElementById('stage').parentNode.insertBefore(list,document.getElementById('stage'));}
  list.innerHTML='';list.style.display='flex';
  ayahs.forEach((r,i)=>{
    setTimeout(()=>{
      const d=document.createElement('div');
      d.style.cssText=i>0?'border-top:1px solid #161616;padding-top:24px;':'';
      d.innerHTML=`<div style="font-family:'Amiri',serif;font-size:clamp(1.1rem,3.4vw,1.75rem);line-height:1.9;direction:rtl;text-align:right;color:#f0f0f0;margin-bottom:6px">${r.arabic||''}</div>
<div style="font-size:clamp(.76rem,1.7vw,.9rem);line-height:1.6;color:#999;font-weight:300">${r.tr||''}</div>
<div style="margin-top:5px;font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;color:#222">${r.name||''} · ${r.s}:${r.a}</div>`;
      list.appendChild(d);
      setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'end'}),80);
    },i*130);
  });
}

// ══ LIVE MODE — zero API for navigation ════════
let liveRunning=false;

async function doLive(chunks,durMs){
  // Serialise: if previous still running, skip (silence gap ensures natural pacing)
  if(liveRunning)return;
  liveRunning=true;
  try{
    const blob=new Blob(chunks,{type:mime});
    const fd=new FormData();
    fd.append('file',blob,'a.'+(mime.includes('webm')?'webm':'mp4'));
    fd.append('model','whisper-1');fd.append('language','ar');
    fd.append('prompt','بسم الله الرحمن الرحيم قرآن كريم');
    const wr=await fetch('https://api.openai.com/v1/audio/transcriptions',{method:'POST',headers:{Authorization:'Bearer '+apiKey},body:fd});
    if(!wr.ok){liveRunning=false;return;}
    const{text}=await wr.json();
    if(!text?.trim()){liveRunning=false;return;}

    const lg=getLang();
    const prevCur=win[1];
    const ctx=prevCur?`Last confirmed: Surah ${prevCur.s} Ayah ${prevCur.a}.`:'';

    const gr=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body:JSON.stringify({model:'gpt-4o',max_tokens:200,messages:[{
        role:'system',
        content:`Quran expert. ${ctx} Identify single ayah being recited. Be generous with errors.
Return ONLY: {"s":78,"a":1} — nothing else.`
      },{role:'user',content:'"'+text.trim()+'"'}]})
    });
    if(!gr.ok){liveRunning=false;return;}
    const raw=(await gr.json()).choices[0]?.message?.content||'';
    let cur={};try{cur=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{liveRunning=false;return;}
    if(!cur.s){liveRunning=false;return;}

    // Check if same as current — skip
    if(win[1]&&win[1].s===cur.s&&win[1].a===cur.a){liveRunning=false;return;}

    // Cancel pace timer
    if(advTmr){clearTimeout(advTmr);advTmr=null;}

    // ── Pace calibration ──────────────────────
    const row=qGet(cur.s,cur.a);
    const charCount=row?(row[3].replace(/\s/g,'').length):0;
    if(charCount>0&&durMs>500){
      samples.push({chars:charCount,ms:durMs});
      if(samples.length>=2){
        const tc=samples.reduce((s,x)=>s+x.chars,0);
        const tm=samples.reduce((s,x)=>s+x.ms,0);
        cpm=tc/tm;
        document.getElementById('pd0').classList.add('on');
        document.getElementById('pd1').classList.add('on');
        document.getElementById('paceLbl').textContent='Темп: '+Math.round(cpm*1000)+' букв/сек';
        document.getElementById('paceLbl').className='pace-lbl ok';
      } else {
        document.getElementById('pd0').classList.add('on');
        document.getElementById('paceLbl').textContent='Калибровка (1/2)...';
      }
    }

    // ── Update window ─────────────────────────
    const prevRow=win[1]?qGet(win[1].s,win[1].a):null;
    const nxtRaw=qNext(cur.s,cur.a);

    win=[
      prevRow ? qFmt(prevRow,lg) : null,
      qFmt(row,lg),
      nxtRaw ? qFmt(nxtRaw,lg) : null
    ];
    renderWin();

    // ── Schedule pace advance ─────────────────
    if(cpm&&nxtRaw){
      const nxtChars=(nxtRaw[3].replace(/\s/g,'').length);
      const estMs=nxtChars/cpm;
      advTmr=setTimeout(()=>paceAdvance(lg),estMs);
    }

  }catch(e){}
  liveRunning=false;
}

function paceAdvance(lg){
  advTmr=null;
  if(!recOn||!win[2])return;
  const newPrev=win[1];
  const newCur=win[2];
  const newNxtRaw=newCur?qNext(newCur.s,newCur.a):null;
  win=[newPrev, newCur, newNxtRaw?qFmt(newNxtRaw,lg):null];
  renderWin();
  // Schedule next
  if(cpm&&newNxtRaw){
    const nc=(newNxtRaw[3].replace(/\s/g,'').length);
    advTmr=setTimeout(()=>paceAdvance(lg),nc/cpm);
  }
}

// ══ Render 3-slot ═════════════════════════════
function renderWin(){
  const ml=document.getElementById('mlist');if(ml)ml.style.display='none';
  document.getElementById('idle').style.display='none';
  document.getElementById('stage').classList.add('on');
  fill('Prev',win[0]);fill('Cur',win[1]);fill('Nxt',win[2]);
}
function fill(slot,ayah){
  document.getElementById('ar'+slot).textContent=ayah?ayah.arabic:'';
  document.getElementById('tr'+slot).textContent=ayah?ayah.tr:'';
  document.getElementById('rf'+slot).textContent=ayah?(ayah.name+' · '+ayah.s+':'+ayah.a):'';
}

// ══ Idle ══════════════════════════════════════
function setIdle(label,live){
  document.getElementById('idleLbl').textContent=label;
  document.getElementById('dots').classList.toggle('on',live);
}
</script>
