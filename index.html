<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quran Live</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#0d0d0d; color:#fff; font-family:'Inter',sans-serif; overflow:hidden; }

/* ══ LAYOUT ══════════════════════════════════════════ */
.app {
display: grid;
grid-template-columns: 1fr 80px;
height: 100%;
}
@media (orientation: portrait) {
.app { grid-template-columns: 1fr; grid-template-rows: 1fr 80px; }
.sidebar { flex-direction: row; justify-content: center; border-left: none; border-top: 1px solid #181818; padding: 0 0 8px; }
.content { padding: 0 24px; }
.settings-panel { right: 16px !important; }
}

/* ══ CONTENT ══════════════════════════════════════════ */
.content {
padding: 0 32px;
display: flex;
flex-direction: column;
overflow: hidden;
position: relative;
}

.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 0 12px;
flex-shrink: 0;
position: relative;
z-index: 10;
}
.app-title {
font-size: 0.65rem;
letter-spacing: 0.24em;
text-transform: uppercase;
color: #303030;
font-weight: 300;
}

/* ══ GEAR ══════════════════════════════════════════════ */
.gear-btn {
width: 30px; height: 30px;
border: none; background: none;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: #303030; transition: color 0.2s;
border-radius: 50%;
}
.gear-btn:hover, .gear-btn.open { color: #999; }
.gear-btn svg { width: 15px; height: 15px; }

/* ══ SETTINGS ══════════════════════════════════════════ */
.settings-panel {
position: fixed;
top: 50px; right: 88px;
width: 260px;
background: #141414;
border: 1px solid #222;
border-radius: 14px;
padding: 16px;
z-index: 500;
display: none;
box-shadow: 0 24px 64px rgba(0,0,0,0.98);
}
.settings-panel.open { display: block; }

.s-label {
display: block;
font-size: 0.62rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #444;
margin-bottom: 6px;
margin-top: 14px;
}
.s-label:first-child { margin-top: 0; }

.settings-panel input,
.settings-panel select {
width: 100%;
background: #0d0d0d;
border: 1px solid #222;
border-radius: 7px;
padding: 8px 11px;
color: #ccc;
font-family: ‘Inter’, sans-serif;
font-size: 0.83rem;
outline: none;
}
.settings-panel input:focus,
.settings-panel select:focus { border-color: #333; }
.settings-panel select option { background: #141414; }

.mode-toggle {
display: flex;
background: #0d0d0d;
border: 1px solid #222;
border-radius: 7px;
overflow: hidden;
}
.mode-btn {
flex: 1; padding: 8px 0;
border: none; background: transparent;
color: #444;
font-family: ‘Inter’, sans-serif;
font-size: 0.76rem;
cursor: pointer; transition: all 0.2s;
}
.mode-btn.active { background: #1c1c1c; color: #ccc; }

.btn-save {
width: 100%; margin-top: 12px; padding: 9px;
background: #fff; color: #000;
border: none; border-radius: 7px;
font-family: ‘Inter’, sans-serif;
font-size: 0.8rem; font-weight: 500;
cursor: pointer; transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.85; }

/* ══ PACE INDICATOR ══════════════════════════════════ */
.pace-bar {
display: none;
align-items: center;
gap: 8px;
padding: 6px 0 10px;
flex-shrink: 0;
}
.pace-bar.visible { display: flex; }
.pace-dot {
width: 5px; height: 5px; border-radius: 50%;
background: #333;
transition: background 0.3s;
}
.pace-dot.active { background: #fff; }
.pace-label {
font-size: 0.6rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #333;
}
.pace-label.calibrated { color: #555; }

/* ══ 3-AYAH PORTRAIT VIEW ════════════════════════════ */
/* Full-height container, 3 equal rows */
.ayah-stage {
flex: 1;
display: none;
flex-direction: column;
justify-content: center;
gap: 0;
overflow: hidden;
}
.ayah-stage.visible { display: flex; }

.ayah-slot {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
padding: 12px 0;
transition: opacity 0.5s ease;
overflow: hidden;
}

/* prev & next: dim */
.ayah-slot.prev { opacity: 0.22; }
.ayah-slot.next { opacity: 0.22; }
/* current: full white */
.ayah-slot.current { opacity: 1; }

/* dividers */
.ayah-slot.current {
border-top: 1px solid #1e1e1e;
border-bottom: 1px solid #1e1e1e;
}

.arabic-text {
font-family: ‘Amiri’, serif;
font-size: clamp(1.1rem, 3.8vw, 1.9rem);
line-height: 1.9;
direction: rtl;
text-align: right;
color: #f0f0f0;
}
.trans-text {
margin-top: 6px;
font-size: clamp(0.78rem, 1.8vw, 0.93rem);
line-height: 1.65;
color: #aaa;
font-weight: 300;
}
.ref-text {
margin-top: 6px;
font-size: 0.58rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: #2a2a2a;
}

/* Slide animation when advancing */
.ayah-stage.sliding .ayah-slot {
transition: opacity 0.4s ease, transform 0.4s ease;
}

/* ══ IDLE ══════════════════════════════════════════════ */
.idle-wrap {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
gap: 10px;
}
.idle-dots { display: flex; gap: 6px; }
.idle-dots span {
width: 4px; height: 4px; border-radius: 50%;
background: #242424;
animation: dp 1.4s ease-in-out infinite;
}
.idle-dots span:nth-child(2) { animation-delay: 0.2s; }
.idle-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dp {
0%,80%,100% { opacity:0.3; transform:scale(0.8); }
40% { opacity:1; transform:scale(1); }
}
.idle-dots.live span { background: #888; }
.idle-text {
font-size: 0.65rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: #282828;
}

/* ══ SIDEBAR ══════════════════════════════════════════ */
.sidebar {
border-left: 1px solid #141414;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 16px;
padding: 16px 0;
flex-shrink: 0;
}

.mic-btn {
width: 56px; height: 56px;
border-radius: 50%;
border: 1.5px solid #1e1e1e;
background: #111;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.25s;
position: relative;
}
.mic-btn svg { width: 20px; height: 20px; fill: #aaa; transition: fill 0.2s; }
.mic-btn:hover { border-color: #444; }
.mic-btn.on { background: #efefef; border-color: #efefef; }
.mic-btn.on svg { fill: #000; }
.mic-btn.on::after {
content: ‘’;
position: absolute; inset: -6px;
border-radius: 50%;
border: 1px solid rgba(255,255,255,0.08);
animation: ring 2s ease-out infinite;
}
@keyframes ring {
0% { transform:scale(1); opacity:1; }
100% { transform:scale(1.6); opacity:0; }
}
.mic-btn.thinking svg { fill: #2a2a2a; }

.timer {
font-size: 0.6rem;
color: #282828;
letter-spacing: 0.08em;
font-variant-numeric: tabular-nums;
}
</style>

</head>

<script>
// ══ Config ════════════════════════════════════════════
let apiKey = localStorage.getItem('qk') || '';
let mode   = localStorage.getItem('qmode') || 'manual';

// ══ Recording state ═══════════════════════════════════
let mediaRec = null, audioCtx = null;
let allChunks = [], pendChunks = [];
let recOn = false;
let timerSec = 0, timerIv = null, autoIv = null;
let silenceTimer = null, wasSpeaking = false;
let sliceStart = 0;
let mime = 'audio/mp4';

// ══ Pace calibration ══════════════════════════════════
// We track: for each confirmed ayah, how long it took (ms) and how many Arabic chars
// From 2+ samples we compute chars/ms → estimate duration of next ayah
let paceSamples = [];     // [{chars, ms}]
let charsPerMs  = null;   // calibrated rate, null = not yet
let pendingSliceStart = 0; // when we started recording THIS slice

// ══ Ayah state ════════════════════════════════════════
let ayahWindow = [null, null, null]; // [prev, current, next]
let liveQueue  = [], liveRunning = false;
let nextPaceTimer = null; // setTimeout for auto-advancing to next ayah

// ══ Init ══════════════════════════════════════════════
document.getElementById('apiKey').value = apiKey;
applyMode(mode);

// ══ Settings ══════════════════════════════════════════
function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  const o = p.classList.toggle('open');
  document.getElementById('gearBtn').classList.toggle('open', o);
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('gearBtn').classList.remove('open');
}
function saveSettings() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('qk', apiKey);
  localStorage.setItem('qmode', mode);
  closeSettings();
}
document.addEventListener('click', e => {
  const p = document.getElementById('settingsPanel');
  const g = document.getElementById('gearBtn');
  if (p.classList.contains('open') && !p.contains(e.target) && !g.contains(e.target)) closeSettings();
});
function setMode(m) { mode = m; applyMode(m); }
function applyMode(m) {
  document.getElementById('mManual').classList.toggle('active', m === 'manual');
  document.getElementById('mAuto').classList.toggle('active', m === 'auto');
}

// ══ Recording ═════════════════════════════════════════
async function toggleRec() {
  recOn ? (mode === 'manual' ? stopManual() : stopLive()) : startRec();
}

async function startRec() {
  if (!apiKey) { alert('Введите API ключ в настройках ⚙️'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    allChunks = []; pendChunks = [];
    ayahWindow = [null, null, null];
    paceSamples = []; charsPerMs = null;
    liveQueue = []; liveRunning = false;
    if (nextPaceTimer) { clearTimeout(nextPaceTimer); nextPaceTimer = null; }

    const m = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
            : MediaRecorder.isTypeSupported('audio/mp4')  ? 'audio/mp4' : '';
    mime = m || 'audio/mp4';
    mediaRec = new MediaRecorder(stream, m ? { mimeType: m } : {});
    mediaRec.ondataavailable = e => {
      if (e.data.size > 0) { allChunks.push(e.data); pendChunks.push(e.data); }
    };
    mediaRec.start(100);
    recOn = true;
    sliceStart = Date.now();
    pendingSliceStart = Date.now();

    document.getElementById('micBtn').classList.add('on');
    document.getElementById('idleWrap').style.display = 'flex';
    document.getElementById('ayahStage').classList.remove('visible');
    setIdle('Слушаем...', true);

    timerSec = 0;
    timerIv = setInterval(() => {
      timerSec++;
      const mm = String(Math.floor(timerSec/60)).padStart(2,'0');
      const ss = String(timerSec%60).padStart(2,'0');
      document.getElementById('timerEl').textContent = mm+':'+ss;
    }, 1000);

    if (mode === 'auto') {
      document.getElementById('paceBar').classList.add('visible');
      startSilenceDetection(stream);
    }
  } catch(e) { alert('Микрофон недоступен: ' + e.message); }
}

async function stopManual() {
  recOn = false;
  clearInterval(timerIv);
  document.getElementById('timerEl').textContent = '';
  if (mediaRec?.state !== 'inactive') { mediaRec.stop(); mediaRec.stream.getTracks().forEach(t=>t.stop()); }
  document.getElementById('micBtn').classList.remove('on').toString();
  document.getElementById('micBtn').classList.add('thinking');
  setIdle('Распознаём...', false);

  await new Promise(r => setTimeout(r, 350));
  const ch = [...allChunks]; allChunks = [];
  await processManual(ch);
  document.getElementById('micBtn').classList.remove('thinking');
}

function stopLive() {
  recOn = false;
  clearInterval(timerIv); clearInterval(autoIv);
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  if (nextPaceTimer) { clearTimeout(nextPaceTimer); nextPaceTimer = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  document.getElementById('timerEl').textContent = '';
  if (mediaRec?.state !== 'inactive') { mediaRec.stop(); mediaRec.stream.getTracks().forEach(t=>t.stop()); }
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('paceBar').classList.remove('visible');
}

// ══ Silence detection ═════════════════════════════════
const SILENCE_THR = 0.012;
const SILENCE_DUR = 1100;  // ms of silence = ayah boundary
const MIN_SLICE   = 1200;  // minimum slice length ms

function startSilenceDetection(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  const ana = audioCtx.createAnalyser();
  ana.fftSize = 512;
  src.connect(ana);
  const buf = new Float32Array(ana.fftSize);

  function rms() {
    ana.getFloatTimeDomainData(buf);
    let s = 0; for (let i=0; i<buf.length; i++) s += buf[i]*buf[i];
    return Math.sqrt(s/buf.length);
  }

  autoIv = setInterval(() => {
    if (!recOn) return;
    const speaking = rms() > SILENCE_THR;
    if (speaking) {
      wasSpeaking = true;
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    } else if (wasSpeaking && !silenceTimer) {
      silenceTimer = setTimeout(() => {
        silenceTimer = null;
        const elapsed = Date.now() - pendingSliceStart;
        if (pendChunks.length > 0 && elapsed >= MIN_SLICE) {
          const sliceDuration = elapsed;
          const b = [...pendChunks]; pendChunks = [];
          pendingSliceStart = Date.now();
          wasSpeaking = false;
          liveQueue.push({ chunks: b, duration: sliceDuration });
          if (liveQueue.length > 5) liveQueue.shift();
          runQueue();
        }
      }, SILENCE_DUR);
    }
  }, 80);
}

// ══ Queue ══════════════════════════════════════════════
async function runQueue() {
  if (liveRunning) return;
  liveRunning = true;
  while (liveQueue.length > 0) {
    const item = liveQueue.shift();
    await processLive(item.chunks, item.duration);
  }
  liveRunning = false;
}

// ══ MANUAL: find all ayahs ════════════════════════════
async function processManual(chunks) {
  if (!chunks.length) return;
  try {
    const blob = new Blob(chunks, { type: mime });
    const fd = new FormData();
    fd.append('file', blob, 'a.' + (mime.includes('webm')?'webm':'mp4'));
    fd.append('model', 'whisper-1');
    fd.append('language', 'ar');
    fd.append('prompt', 'بسم الله الرحمن الرحيم قرآن كريم');

    const wr = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method:'POST', headers:{Authorization:'Bearer '+apiKey}, body:fd
    });
    if (!wr.ok) return;
    const { text } = await wr.json();
    if (!text?.trim()) return;

    const ln = getLang();
    const gr = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'gpt-4o', max_tokens:3000,
        messages:[{
          role:'system',
          content:`Quran expert. Identify ALL ayahs recited in order. Return COMPLETE full Arabic text for each.
JSON array only, no markdown:
[{"s":78,"a":1,"name":"An-Naba","arabic":"FULL TEXT","tr":"translation in ${ln}"},...]
Empty array if nothing.`
        },{role:'user',content:'"'+text.trim()+'"'}]
      })
    });
    if (!gr.ok) return;
    const raw = (await gr.json()).choices[0]?.message?.content||'';
    let arr=[]; try{arr=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{}
    if (!Array.isArray(arr)||!arr.length) return;

    // Show as scrollable list (manual mode)
    showManualResults(arr);
  } catch(e){}
  document.getElementById('micBtn').classList.remove('thinking');
}

function showManualResults(arr) {
  // Re-use stage but show all in a scrollable list instead of 3-slot
  const stage = document.getElementById('ayahStage');
  const idle  = document.getElementById('idleWrap');
  idle.style.display = 'none';

  // Replace stage with a scrollable list for manual mode
  let list = document.getElementById('manualList');
  if (!list) {
    list = document.createElement('div');
    list.id = 'manualList';
    list.style.cssText = 'flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:28px;padding:12px 0 24px;';
    stage.parentNode.insertBefore(list, stage);
  }
  list.innerHTML = '';
  list.style.display = 'flex';
  stage.classList.remove('visible');

  arr.forEach((r,i) => {
    setTimeout(() => {
      const d = document.createElement('div');
      d.style.cssText = i>0 ? 'border-top:1px solid #181818;padding-top:28px;' : '';
      d.innerHTML = `
        <div style="font-family:'Amiri',serif;font-size:clamp(1.2rem,3.5vw,1.8rem);line-height:1.9;direction:rtl;text-align:right;color:#f0f0f0;margin-bottom:8px">${r.arabic}</div>
        <div style="font-size:clamp(0.82rem,1.8vw,0.95rem);line-height:1.65;color:#aaa;font-weight:300">${r.tr}</div>
        <div style="margin-top:6px;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:#2a2a2a">${r.name} · ${r.s}:${r.a}</div>
      `;
      list.appendChild(d);
      setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'end'}),100);
    }, i*120);
  });
}

// ══ LIVE: process one ayah slice ══════════════════════
async function processLive(chunks, sliceDurationMs) {
  if (!chunks.length) return;
  try {
    const blob = new Blob(chunks, { type: mime });
    const fd = new FormData();
    fd.append('file', blob, 'a.'+(mime.includes('webm')?'webm':'mp4'));
    fd.append('model', 'whisper-1');
    fd.append('language', 'ar');
    fd.append('prompt', 'بسم الله الرحمن الرحيم قرآن كريم');

    const wr = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method:'POST', headers:{Authorization:'Bearer '+apiKey}, body:fd
    });
    if (!wr.ok) return;
    const { text } = await wr.json();
    if (!text?.trim()) return;

    const ln = getLang();
    const prev = ayahWindow[1]; // current becomes prev after advance
    const ctx  = prev ? `Previous ayah confirmed: Surah ${prev.s} (${prev.name}) Ayah ${prev.a}.` : '';

    const gr = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'gpt-4o', max_tokens:900,
        messages:[{
          role:'system',
          content:`Quran expert. ${ctx}
Identify the ayah recited. Be very generous with errors.
Return ONLY JSON, no markdown:
{"s":78,"a":1,"name":"An-Naba","arabic":"COMPLETE FULL AYAH","tr":"translation in ${ln}"}`
        },{role:'user',content:'"'+text.trim()+'"'}]
      })
    });
    if (!gr.ok) return;
    const raw=(await gr.json()).choices[0]?.message?.content||'';
    let cur={};
    try{cur=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch{return;}
    if (!cur.s) return;

    // ── Pace calibration ───────────────────────────────
    const charCount = (cur.arabic||'').replace(/\s/g,'').length;
    if (charCount > 0 && sliceDurationMs > 500) {
      paceSamples.push({ chars: charCount, ms: sliceDurationMs });
      if (paceSamples.length >= 2) {
        // Compute weighted average chars/ms
        const totalChars = paceSamples.reduce((s,x)=>s+x.chars,0);
        const totalMs    = paceSamples.reduce((s,x)=>s+x.ms,0);
        charsPerMs = totalChars / totalMs;
        updatePaceUI(true);
      } else {
        updatePaceUI(false);
      }
    }

    // Skip if same ayah still
    const curKey = cur.s+':'+cur.a;
    if (ayahWindow[1] && ayahWindow[1].s+':'+ayahWindow[1].a === curKey) return;

    // Cancel pending pace-advance timer (GPT confirmed before it fired)
    if (nextPaceTimer) { clearTimeout(nextPaceTimer); nextPaceTimer = null; }

    // Fetch next ayah (background, non-blocking)
    fetchOneNext(cur.s, cur.a, ln).then(nxt => {
      // Update window: prev=old current, current=cur, next=nxt
      const oldCur = ayahWindow[1];
      ayahWindow = [oldCur, cur, nxt];
      renderWindow();

      // Schedule pace-based auto-advance IF calibrated
      schedulePaceAdvance(nxt, ln);
    });

  } catch(e){}
}

// ══ Fetch one next ayah ════════════════════════════════
async function fetchOneNext(s, a, ln) {
  try {
    const gr = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{Authorization:'Bearer '+apiKey,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'gpt-4o', max_tokens:500,
        messages:[{
          role:'system',
          content:`Return the single next Quran ayah after Surah ${s} Ayah ${a}.
JSON only, no markdown:
{"s":78,"a":2,"name":"An-Naba","arabic":"COMPLETE FULL TEXT","tr":"translation in ${ln}"}`
        },{role:'user',content:'Next ayah after '+s+':'+a}]
      })
    });
    if (!gr.ok) return null;
    const raw=(await gr.json()).choices[0]?.message?.content||'';
    const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
    return r.s ? r : null;
  } catch{return null;}
}

// ══ Pace-based auto-advance ════════════════════════════
function schedulePaceAdvance(nextAyah, ln) {
  if (!nextAyah || !charsPerMs) return;

  // Estimate how long the NEXT ayah will take
  const chars = (nextAyah.arabic||'').replace(/\s/g,'').length;
  const estimatedMs = chars / charsPerMs;

  // Advance display when estimated time is up
  nextPaceTimer = setTimeout(async () => {
    nextPaceTimer = null;
    if (!recOn) return;

    // Shift window: prev=current, current=next, next=fetch new
    const newPrev = ayahWindow[1];
    const newCur  = ayahWindow[2];
    if (!newCur) return;

    ayahWindow = [newPrev, newCur, null];
    renderWindow();

    // Fetch the one after
    const nxt = await fetchOneNext(newCur.s, newCur.a, ln);
    ayahWindow[2] = nxt;
    renderWindow();

    // Schedule next advance
    schedulePaceAdvance(nxt, ln);
  }, estimatedMs);
}

// ══ Render 3-slot window ══════════════════════════════
function renderWindow() {
  const [prev, cur, nxt] = ayahWindow;

  document.getElementById('idleWrap').style.display = 'none';
  const ml = document.getElementById('manualList');
  if (ml) ml.style.display = 'none';
  document.getElementById('ayahStage').classList.add('visible');

  fillSlot('prev', prev);
  fillSlot('cur',  cur);
  fillSlot('next', nxt);
}

function fillSlot(slot, ayah) {
  const prefix = slot === 'cur' ? 'cur' : slot === 'prev' ? 'prev' : 'next';
  document.getElementById(prefix+'Arabic').textContent = ayah ? ayah.arabic : '';
  document.getElementById(prefix+'Trans').textContent  = ayah ? ayah.tr     : '';
  document.getElementById(prefix+'Ref').textContent    = ayah ? (ayah.name+' · '+ayah.s+':'+ayah.a) : '';
}

// ══ Pace UI ════════════════════════════════════════════
function updatePaceUI(calibrated) {
  const bar   = document.getElementById('paceBar');
  const label = document.getElementById('paceLabel');
  document.getElementById('pd0').classList.toggle('active', paceSamples.length >= 1);
  document.getElementById('pd1').classList.toggle('active', paceSamples.length >= 2);
  if (calibrated) {
    const cpm = Math.round(charsPerMs * 1000);
    label.textContent = `Темп: ${cpm} букв/сек`;
    label.className = 'pace-label calibrated';
  } else {
    label.textContent = `Калибровка... (${paceSamples.length}/2)`;
    label.className = 'pace-label';
  }
}

// ══ Helpers ════════════════════════════════════════════
function getLang() {
  const m={ru:'Russian',en:'English',tr:'Turkish',uz:'Uzbek',kk:'Kazakh',tj:'Tajik',de:'German',fr:'French'};
  return m[document.getElementById('langSelect').value]||'Russian';
}
function setIdle(label, live) {
  document.getElementById('idleText').textContent = label;
  document.getElementById('idleDots').classList.toggle('live', live);
}
</script>
